/* ═══════════════════════════════════════
   BADGE COMPONENT
═══════════════════════════════════════ */
const TS={Email:{bg:C.blueL,c:C.blue,b:C.blueM},Push:{bg:C.purpleL,c:C.purple,b:C.purpleB},Sms:{bg:C.greenL,c:C.greenT,b:C.greenB},SMS:{bg:C.greenL,c:C.greenT,b:C.greenB}};
const SS={Active:{bg:C.greenL,c:C.greenT,b:C.greenB},Inactive:{bg:C.grayL,c:C.gray,b:C.grayB},Error:{bg:C.redL,c:C.redT,b:C.redB},Yes:{bg:C.greenL,c:C.greenT,b:C.greenB},No:{bg:C.redL,c:C.redT,b:C.redB}};
function Badge({v,sx={}}){const s=TS[v]||SS[v]||{bg:C.grayL,c:C.gray,b:C.grayB};return<span style={{display:"inline-flex",alignItems:"center",padding:"2px 8px",borderRadius:4,fontSize:12,fontWeight:500,background:s.bg,color:s.c,border:`1px solid ${s.b}`,...sx}}>{v}</span>;}

/* ═══════════════════════════════════════
   SHARED ATOMS
═══════════════════════════════════════ */
function Btn({children,variant="dark",onClick,sx={},disabled}){
  const vs={dark:{background:"#111827",color:"#fff",border:"none"},outline:{background:C.bg,border:`1px solid ${C.grayB}`,color:C.t2},blue:{background:C.blue,color:"#fff",border:"none"},ghost:{background:"transparent",border:"none",color:C.t2}};
  return<button disabled={disabled} onClick={onClick} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,fontWeight:500,borderRadius:7,cursor:disabled?"not-allowed":"pointer",fontSize:13,padding:"7px 16px",transition:"opacity .12s",opacity:disabled?.5:1,...vs[variant],...sx}} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity=".85"}} onMouseLeave={e=>{if(!disabled)e.currentTarget.style.opacity="1"}}>{children}</button>;
}
function Inp({placeholder,type="text",value,onChange,sx={}}){
  return<input type={type} placeholder={placeholder} value={value} onChange={onChange}
    style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",...sx}}
    onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`}}
    onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none"}}/>;
}
function Sel({options,value,onChange,sx={}}){
  return<select value={value} onChange={onChange}
    style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",cursor:"pointer",...sx}}>
    {options.map(o=><option key={o}>{o}</option>)}
  </select>;
}

/* ═══════════════════════════════════════
   DOT MENU
═══════════════════════════════════════ */
function DotMenu({items}){
  const [open,setOpen]=useState(false);const ref=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  return<div ref={ref} style={{position:"relative",display:"inline-block"}} onClick={e=>e.stopPropagation()}>
    <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.t3,padding:"1px 6px",letterSpacing:"2px",lineHeight:1,borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.background=C.bg2} onMouseLeave={e=>e.currentTarget.style.background="none"}>⋮</button>
    {open&&<div style={{position:"absolute",right:0,top:24,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,.1)",minWidth:165,zIndex:100,padding:"4px 0"}}>
      {items.map(([l,col,fn])=><button key={l} onClick={()=>{fn&&fn();setOpen(false)}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"7px 14px",fontSize:12.5,color:col||C.blue,background:"none",border:"none",cursor:"pointer",textAlign:"left"}} onMouseEnter={e=>e.currentTarget.style.background=C.bg2} onMouseLeave={e=>e.currentTarget.style.background="none"}>{l}</button>)}
    </div>}
  </div>;
}

function GMCReasoningModal({diff,onConfirm,onCancel}){

    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
      <div style={{background:C.bg,borderRadius:8,width:520,maxWidth:"96%",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 4px 24px rgba(0,0,0,.18)",overflow:"hidden"}}>

          <span style={{fontSize:15,fontWeight:600,color:C.text}}>Submit Request</span>

        <div style={{flex:1,overflowY:"auto",padding:"0 20px 16px"}}>
          {/* Diff preview */}
          <div style={{marginBottom:16,padding:"10px 14px",background:C.bg2,borderRadius:6,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,fontWeight:600,color:C.t2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Changes Detected</div>
            {diff.map((d,i)=><div key={i} style={{fontSize:12.5,color:C.text,marginBottom:4}}><span style={{fontWeight:600}}>{d.field}:</span> <span style={{color:C.t3,textDecoration:"line-through",marginRight:6}}>{d.old.length>40?d.old.substring(0,40)+"...":d.old}</span><span style={{color:C.green}}>→ Modified</span></div>)}
          </div>
          {/* Reason */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6}}>Reason <span style={{color:C.red}}>*</span></div>
            <textarea value={reason} onChange={e=>{setReason(e.target.value);setErr(false);}} placeholder="Enter reason for this change..." style={{width:"100%",padding:"8px 10px",border:`1px solid ${err?C.red:C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",resize:"vertical",minHeight:80,fontFamily:"inherit"}} onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=err?C.red:C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            {err&&<div style={{fontSize:12,color:C.red,marginTop:4}}>Reason is required.</div>}
          </div>
          {/* Context */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6}}>Context <span style={{fontSize:12,color:C.t3,fontWeight:400}}>(Optional)</span></div>
            <textarea value={ctx} onChange={e=>setCtx(e.target.value)} placeholder="Include all evidences and links. May be used for audit purposes." style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",resize:"vertical",minHeight:70,fontFamily:"inherit"}} onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
          </div>
          {/* Attachments */}
          <div>
            <div style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6}}>Supporting Documents <span style={{fontSize:12,color:C.t3,fontWeight:400}}>(Optional · up to 3 files)</span></div>
            <div style={{border:`1.5px dashed ${C.grayB}`,borderRadius:6,padding:"16px",textAlign:"center",cursor:"pointer",color:C.t3,fontSize:12.5}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.blue} onMouseLeave={e=>e.currentTarget.style.borderColor=C.grayB}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:6,display:"block",margin:"0 auto 6px"}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Attach Document

            </div>
          </div>
        </div>
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end"}}>

function ExpandableFields({diff,mainCount}){
  const [open,setOpen]=useState(false);
  /* Fields beyond mainCount go into the expandable section - no duplicates */
  const MAX=mainCount!=null?mainCount:3;
  const hidden=diff.slice(MAX);
  if(hidden.length===0)return null;
  const pHdr2={background:"#EDE9FF",padding:"8px 12px",fontWeight:600,fontSize:12.5,color:"#3B3FFF",border:"1px solid #DDD6FE"};
  const pCell2={padding:"10px 12px",borderBottom:`1px solid ${C.border}`,fontSize:12.5,color:C.text,verticalAlign:"top"};
  return(
    <div style={{marginTop:8,border:`1px solid #EDE9FF`,borderRadius:6,overflow:"hidden"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#f8f7ff",border:"none",cursor:"pointer",fontSize:12.5,color:"#3B3FFF",fontWeight:500}}>
        <span style={{display:"flex",alignItems:"center",gap:6}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          {open?"Hide":"View"} {hidden.length} other field{hidden.length!==1?"s":""}
        </span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}><path d="M6 9l6 6 6-6"/></svg>
      </button>
      {open&&(
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={pHdr2}>Field</th>
            <th style={pHdr2}>Current Value</th>
            <th style={{...pHdr2,borderLeft:`1px solid #DDD6FE`}}>Proposed Value</th>
          </tr></thead>
          <tbody>{hidden.map((d,i)=>(
            <tr key={i} style={{background:i%2===0?"#fff":"#fafbff"}}>
              <td style={{...pCell2,fontWeight:600,width:110,whiteSpace:"nowrap"}}>{d.field}</td>
              <td style={{...pCell2,color:C.t2,fontFamily:"monospace",fontSize:12}}>{d.old||"—"}</td>
              <td style={{...pCell2,color:C.t2,fontFamily:"monospace",fontSize:12,borderLeft:`1px solid #EDE9FF`}}>{d.nw||d.old||"—"}</td>
            </tr>
          ))}</tbody>
        </table>
      )}
    </div>
  );
}

                  {req.approvalCount>1&&<div style={{marginLeft:8}}>

          </div>
        )}

        <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
          {(!isClosed||tab==="maker")&&<>
            {/* ── SECTION A: Reason + Attachments ── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginBottom:20}}>

                {req.atts&&req.atts.length>0?(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {req.atts.map((a,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",border:`1px solid ${C.border}`,borderRadius:6,background:C.bg2,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background=C.bg2}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.t2} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span style={{fontSize:12.5,color:C.text}}>{a.name}</span>
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{fontSize:12.5,color:C.t3}}>No attachments</div>
                )}
              </div>
            </div>

            {/* Context text */}
            {req.context&&<div style={{marginBottom:20}}>
              <div style={{fontSize:12.5,fontWeight:600,color:C.text,marginBottom:6}}>Context</div>
              <div style={{fontSize:13,color:C.t2,lineHeight:1.7}}>{req.context}</div>
            </div>}

            {/* ── SECTION B: Data Difference Review ── */}
            {(()=>{
              /* GOLDEN RULE (dynamic, applies to any future use case):
                 1. Changed fields always come first in the table.
                 2. Max 3 fields shown in the main visible table.
                 3. If fewer than 3 total fields exist, show all (no padding).
                 4. Everything beyond position 3 goes into "View X Other Fields" expandable.
                 5. No field ever appears in both sections — clean slice, zero duplication.
                 This works automatically for any diff array regardless of how many
                 changed/unchanged fields a request carries. */
              const changedFields=req.diff.filter(d=>d.changed);
              const otherFields=req.diff.filter(d=>!d.changed);
              const orderedDiff=[...changedFields,...otherFields];
              /* mainCount: always min(3, total) — works for 1 field or 20 fields */
              const mainCount=Math.min(3,orderedDiff.length);
              return(
              <div style={{marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,textAlign:"center",marginBottom:10}}>Data Difference Review</div>
              <table style={{width:"100%",borderCollapse:"collapse",border:`1px solid #DDD6FE`}}>
                <thead><tr>
                  <th style={pHdr}>Field</th>
                  <th style={pHdr}>Current Value</th>
                  <th style={{...pHdr,borderLeft:`1px solid #DDD6FE`}}>Proposed Value</th>
                </tr></thead>
                <tbody>{orderedDiff.slice(0,mainCount).map((d,i)=>{
                  const buildDiff=(oldStr,newStr)=>{
                    if(!d.changed)return{oldEl:<span style={{color:C.t2,fontSize:12.5}}>{oldStr}</span>,newEl:<span style={{color:C.t2,fontSize:12.5}}>{newStr}</span>};
                    /* Find common prefix and suffix to isolate the exact changed region */
                    const o=oldStr||"";const nv=newStr||"";
                    let pLen=0;while(pLen<o.length&&pLen<nv.length&&o[pLen]===nv[pLen])pLen++;
                    let oSuf=o.length,nSuf=nv.length;
                    while(oSuf>pLen&&nSuf>pLen&&o[oSuf-1]===nv[nSuf-1]){oSuf--;nSuf--;}
                    const CONTEXT=40;
                    const prefixStart=Math.max(0,pLen-CONTEXT);
                    const suffixEnd=Math.min(o.length,oSuf+CONTEXT);
                    const nSuffixEnd=Math.min(nv.length,nSuf+CONTEXT);
                    const oldChanged=o.slice(pLen,oSuf);
                    const newChanged=nv.slice(pLen,nSuf);
                    const ctxBefore=o.slice(prefixStart,pLen);
                    const ctxAfterOld=o.slice(oSuf,suffixEnd);
                    const ctxAfterNew=nv.slice(nSuf,nSuffixEnd);
                    const ellipsisBefore=prefixStart>0;
                    const ellipsisAfterOld=suffixEnd<o.length;
                    const ellipsisAfterNew=nSuffixEnd<nv.length;
                    const codeStyle={fontFamily:"monospace",fontSize:12,lineHeight:1.8,display:"block",wordBreak:"break-word",whiteSpace:"pre-wrap"};
                    const oldEl=(
                      <span style={codeStyle}>
                        {ellipsisBefore&&<span style={{color:C.t3}}>…</span>}
                        <span style={{color:C.t2}}>{ctxBefore}</span>
                        {oldChanged&&<span style={{background:"#ffd7d5",color:"#b91c1c",fontWeight:600,borderRadius:3,padding:"0 2px",textDecoration:"line-through"}}>{oldChanged}</span>}
                        <span style={{color:C.t2}}>{ctxAfterOld}</span>
                        {ellipsisAfterOld&&<span style={{color:C.t3}}>…</span>}
                      </span>
                    );
                    const newEl=(
                      <span style={codeStyle}>
                        {ellipsisBefore&&<span style={{color:C.t3}}>…</span>}
                        <span style={{color:C.t2}}>{ctxBefore}</span>
                        {newChanged&&<span style={{background:"#ccffd8",color:"#15803d",fontWeight:600,borderRadius:3,padding:"0 2px"}}>{newChanged}</span>}
                        <span style={{color:C.t2}}>{ctxAfterNew}</span>
                        {ellipsisAfterNew&&<span style={{color:C.t3}}>…</span>}
                      </span>
                    );
                    return{oldEl,newEl};
                  };
                  const {oldEl,newEl}=buildDiff(d.old,d.nw);
                  const isLong=d.old&&d.old.length>120;
                  return(
                  <tr key={i} style={{background:i%2===0?C.bg:"#fafbff",borderBottom:`1px solid #EDE9FF`}}>
                    <td style={{...pCell,fontWeight:600,verticalAlign:"top",whiteSpace:"nowrap",width:110,color:C.text}}>{d.field}</td>
                    <td style={{...pCell,verticalAlign:"top",background:d.changed?"#fff8f8":C.bg,padding:"12px 16px"}}>
                      <div style={{maxHeight:isLong?180:80,overflowY:isLong?"auto":"visible"}}>{oldEl}</div>
                    </td>
                    <td style={{...pCell,verticalAlign:"top",background:d.changed?"#f8fff9":C.bg,padding:"12px 16px",borderLeft:`1px solid #EDE9FF`}}>
                      <div style={{maxHeight:isLong?180:80,overflowY:isLong?"auto":"visible"}}>{newEl}</div>
                    </td>
                  </tr>
                  );
                })}</tbody>
              </table>
              <ExpandableFields diff={orderedDiff} mainCount={mainCount}/>
            </div>
              );
            })()}

            {/* ── SECTION B: Additional Context (two side-by-side mini tables) ── */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,textAlign:"center",marginBottom:10}}>Additional Context</div>

                  <thead><tr><th style={ctxHdr}>Field</th><th style={ctxHdr}>Current Value</th></tr></thead>
                  <tbody>{req.ctxData.slice(0,Math.ceil(req.ctxData.length/2)).map((c,i)=>(
                    <tr key={i}><td style={{...ctxCell,fontWeight:600,fontSize:12.5}}>{c.l}</td><td style={{...ctxCell,color:C.t2}}>{c.v}</td></tr>
                  ))}</tbody>
                </table>
                <table style={{borderCollapse:"collapse",border:`1px solid #DDD6FE`}}>
                  <thead><tr><th style={ctxHdr}>Field</th><th style={ctxHdr}>Current Value</th></tr></thead>
                  <tbody>{req.ctxData.slice(Math.ceil(req.ctxData.length/2)).map((c,i)=>(
                    <tr key={i}><td style={{...ctxCell,fontWeight:600,fontSize:12.5}}>{c.l}</td><td style={{...ctxCell,color:C.t2}}>{c.v}</td></tr>
                  ))}</tbody>
                </table>
              </div>
            </div>

            {/* ── SECTION C: Action Zone ── */}
            {!isClosed&&(
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
                {isChecker?(
                  <>

    </div>
  );
}

function GMCLogsView({logs,setLogs,templates,setTemplates}){
  const [sel,setSel]=useState(null);

  const [toast,setToast]=useState(null);
  const [showLogFilters,setShowLogFilters]=useState(false);
  const [logStatusF,setLogStatusF]=useState("");
  const [logDomainF,setLogDomainF]=useState("");
  const [logSearch,setLogSearch]=useState("");
  const filteredLogs=logs.filter(r=>{
    if(logStatusF&&r.status!==logStatusF)return false;
    if(logDomainF&&r.domain!==logDomainF)return false;
    if(logSearch){
      const q=logSearch.toLowerCase();
      if(!r.activityId.toLowerCase().includes(q)&&!r.maker.toLowerCase().includes(q)&&!r.id.toLowerCase().includes(q))return false;
    }
    return true;
  });
  const handleApprove=(id,remark)=>{
    setLogs(p=>p.map(r=>r.id===id?{...r,status:"Approved",checkerName:"Roushan Gupta",checkerDate:new Date().toLocaleString(),checkerRemark:remark||"Approved."}:r));
    const log=logs.find(r=>r.id===id);
    if(log&&log.targetTemplateId){
      const newVals={};
      log.diff.forEach(d=>{if(d.field==="Body")newVals.body=d.nw;if(d.field==="Subject")newVals.subject=d.nw;if(d.field==="Status")newVals.status=d.nw;});
      setTemplates(p=>p.map(t=>t.id===log.targetTemplateId?{...t,...newVals}:t));
    }
    setSel(null);setToast("Request approved. Template updated successfully.");
  };
  const handleReject=(id,remark)=>{
    setLogs(p=>p.map(r=>r.id===id?{...r,status:"Rejected",checkerName:"Roushan Gupta",checkerDate:new Date().toLocaleString(),checkerRemark:remark||"Rejected."}:r));
    setSel(null);setToast("Request rejected.");
  };
  const handleWithdraw=(id)=>{
    setLogs(p=>p.map(r=>r.id===id?{...r,status:"Withdrawn"}:r));
    setSel(null);setToast("Request withdrawn successfully.");
  };

            {[["gmc:view","Utkarsh (View only)"],["gmc:manage","Roushan (Checker)"]].map(([perm,label])=>(
              <button key={perm} onClick={()=>setViewerPerm(perm)} style={{padding:"4px 12px",fontSize:12,border:"none",cursor:"pointer",borderRadius:6,background:viewerPerm===perm?C.bg:"transparent",color:viewerPerm===perm?C.blue:C.t2,fontWeight:viewerPerm===perm?600:400,boxShadow:viewerPerm===perm?"0 1px 3px rgba(0,0,0,.1)":"none",transition:"all .12s"}}>{label}</button>

           {name:"status",label:"Status",strategy:"Select"},
         ]},

      checkers:[{userId:"usr_008",name:"Saurabh",domainKey:"kyc:manage"},{userId:"usr_009",name:"Dipanshu",domainKey:"kyc:manage"}],

      ],

      checkers:[{userId:"usr_011",name:"Abhinav",domainKey:"admin:manage"},{userId:"usr_012",name:"Kanishk",domainKey:"admin:manage"}],
    },
    "Platform":{
      modals:[
        {id:"edit-config-modal",label:"Edit Config",url:"/platform/config/:key/edit",

           {name:"environment",label:"Environment",strategy:"Select"},
         ]},
      ],
      makers:[{userId:"usr_013",name:"Saurabh",domainKey:"platform:manage"},{userId:"usr_014",name:"Adnan",domainKey:"platform:manage"}],
      checkers:[{userId:"usr_015",name:"Dipanshu",domainKey:"platform:manage"}],
    },
  };

  const [approvalCount,setApprovalCount]=useState(1);
  const [section,setSection]=useState("");
  const [modalId,setModalId]=useState("");
  const [diffRows,setDiffRows]=useState([]);
  const [ctxRows,setCtxRows]=useState([{label:"",query:""}]);
  const [diffAutoLoaded,setDiffAutoLoaded]=useState(false);
  const [selectedCheckers,setSelectedCheckers]=useState([]);
  const [saveAttempted,setSaveAttempted]=useState(false);

  const domainData=section&&MODAL_REGISTRY[section]?MODAL_REGISTRY[section]:null;
  const availableModals=domainData?domainData.modals:[];
  const selectedModal=availableModals.find(m=>m.id===modalId)||null;
  const makers=domainData?domainData.makers:[];
  const checkers=domainData?domainData.checkers:[];

  /* Dynamic validation: selected checkers must satisfy approval count */
  const checkerSatisfied=selectedCheckers.length>=approvalCount;
  const checkerShortfall=Math.max(0,approvalCount-selectedCheckers.length);

  /* Reset selected checkers when domain changes */
  useEffect(()=>{setSelectedCheckers([]);},[section]);

  const toggleChecker=(userId)=>{
    setSelectedCheckers(prev=>
      prev.includes(userId)?prev.filter(id=>id!==userId):[...prev,userId]
    );
  };

  const handleSaveActivity=()=>{
    setSaveAttempted(true);
    if(!checkerSatisfied)return; /* Block save */
    onClose(); /* proceed */
  };

  /* Auto-populate diff rows when domain + modal both selected */
  useEffect(()=>{
    if(selectedModal){
      setDiffRows(selectedModal.fields.map(f=>({...f,removed:false})));
      setDiffAutoLoaded(true);
    } else {
      setDiffRows([]);
      setDiffAutoLoaded(false);
    }
  },[modalId,section]);

  const labelS={fontSize:12.5,fontWeight:500,color:C.text,marginBottom:5,display:"block"};
  const inputS={width:"100%",padding:"7px 10px",border:`1px solid ${C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none"};
  const selS={...inputS,cursor:"pointer",appearance:"none",WebkitAppearance:"none"};
  const miniTh={fontSize:11,fontWeight:600,color:C.t2,padding:"8px 10px",background:C.bg2,borderBottom:`1px solid ${C.border}`,textTransform:"uppercase",letterSpacing:".05em"};
  const miniTd={padding:"8px 10px",borderBottom:`1px solid ${C.border}`,fontSize:12.5,color:C.text,verticalAlign:"middle"};
  const strategyColors={"HTML Diff":{bg:"#eff6ff",c:C.blue},"Plain Text":{bg:C.grayL,c:C.gray},"Select":{bg:"#f0fdf4",c:C.greenT},"JSON Diff":{bg:C.purpleL,c:C.purple}};

  return(
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:C.bg,borderRadius:8,width:720,maxWidth:"96%",maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 4px 24px rgba(0,0,0,.18)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 12px",borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:15,fontWeight:600,color:C.text}}>Create Activity</span>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.t3,lineHeight:1}}>×</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>

          {/* ── BASIC DETAILS ── */}
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`,textTransform:"uppercase",letterSpacing:".06em"}}>Basic Details</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            <div>
              <label style={labelS}>Activity Name</label>
              <input style={inputS} placeholder="e.g. Edit Email Template"
                onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}}
                onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            </div>
            <div>
              <label style={labelS}>Domain</label>
              <div style={{position:"relative"}}>
                <select value={section} onChange={e=>{setSection(e.target.value);setModalId("");}} style={selS}
                  onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}}
                  onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}>
                  <option value="">Select domain...</option>
                  <option>Communication</option><option>Payments</option>
                  <option>Customers &amp; KYC</option><option>Admin</option><option>Platform</option>
                </select>
                <svg style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
              </div>
            </div>
            <div>
              <label style={labelS}>
                Modal ID / URL
                <span style={{fontSize:11,fontWeight:400,color:C.t3,marginLeft:6}}>(identifies which screen this activity intercepts)</span>
              </label>
              {section?(
                <div style={{position:"relative"}}>
                  <select value={modalId} onChange={e=>setModalId(e.target.value)} style={selS}
                    onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}}
                    onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}>
                    <option value="">Select modal / screen...</option>
                    {availableModals.map(m=><option key={m.id} value={m.id}>{m.label} — {m.url}</option>)}
                  </select>
                  <svg style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
              ):(
                <input style={{...inputS,background:C.bg2,color:C.t3}} disabled placeholder="Select a domain first..."/>
              )}
            </div>
            <div>
              <label style={labelS}>Callback URL</label>
              <input style={inputS}
                value={selectedModal?`/api/gmc-callback${selectedModal.url.replace("/:id/edit","").replace("/new","")}`:""} 
                placeholder="https://service/gmc-callback/..."
                onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}}
                onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}
                onChange={()=>{}}/>
            </div>
            <div>
              <label style={labelS}>SLA Duration (hrs)</label>
              <input type="number" defaultValue="4" style={inputS}
                onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}}
                onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            </div>
            <div>
              <label style={labelS}>Warning At (%)</label>
              <input type="number" defaultValue="80" style={inputS}
                onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}}
                onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <label style={labelS}>
                Approval Count
                <span style={{fontSize:11,fontWeight:400,color:C.t3,marginLeft:6}}>Checkers required to approve before execution · Assign Checkers section below will validate against this</span>
              </label>
              <div style={{display:"flex",alignItems:"center",gap:14,marginTop:6}}>
                {/* Dropdown selector */}
                <div style={{position:"relative",width:120}}>
                  <select value={approvalCount} onChange={e=>setApprovalCount(Number(e.target.value))}
                    style={{width:"100%",padding:"8px 32px 8px 12px",border:`1.5px solid ${C.blue}`,borderRadius:7,fontSize:14,fontWeight:600,color:C.text,background:C.bg,outline:"none",cursor:"pointer",appearance:"none",WebkitAppearance:"none"}}
                    onFocus={e=>{e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}}
                    onBlur={e=>{e.currentTarget.style.boxShadow="none";}}>
                    {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                  <svg style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                {/* Progress circles only */}
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{display:"flex",gap:5}}>
                    {Array.from({length:approvalCount}).map((_,i)=>(
                      <div key={i} style={{width:10,height:10,borderRadius:"50%",background:i<selectedCheckers.length?C.blue:C.grayB,border:`2px solid ${i<selectedCheckers.length?C.blue:C.grayB}`,transition:"all .2s"}}/>
                    ))}
                  </div>
                  <span style={{fontSize:12,color:C.t3}}>{selectedCheckers.length} of {approvalCount} checker{approvalCount!==1?"s":""} assigned</span>
                </div>
              </div>
            </div>
          </div>

          {/* ── DIFF QUERIES ── */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:12,fontWeight:700,color:C.text,textTransform:"uppercase",letterSpacing:".06em"}}>Diff Fields</span>
            {diffAutoLoaded&&<span style={{fontSize:11.5,color:C.greenT,display:"flex",alignItems:"center",gap:4}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Auto-populated from {selectedModal&&selectedModal.label}
            </span>}
          </div>

          {!section||!modalId?(
            <div style={{border:`1px solid ${C.border}`,borderRadius:6,padding:"24px 16px",textAlign:"center",marginBottom:14,background:C.bg2}}>
              <div style={{fontSize:13,color:C.t3,marginBottom:4}}>Select Domain and Modal ID / URL above</div>
              <div style={{fontSize:12,color:C.t3}}>All available diff fields from that modal will be auto-populated here</div>
            </div>
          ):(
            <div style={{border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:14}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  <th style={miniTh}>#</th>
                  <th style={miniTh}>Field Name</th>
                  <th style={miniTh}>Display Label</th>
                  <th style={miniTh}>Diff Strategy</th>
                  <th style={{...miniTh,textAlign:"center",width:60}}>Include</th>
                </tr></thead>
                <tbody>
                  {diffRows.length===0&&<tr><td colSpan={5} style={{...miniTd,textAlign:"center",color:C.t3}}>No fields available for this modal</td></tr>}
                  {diffRows.map((r,i)=>(
                    <tr key={i} style={{background:r.removed?"#fef2f2":C.bg,opacity:r.removed?0.5:1,transition:"all .15s"}}>
                      <td style={{...miniTd,width:32,color:C.t3}}>{i+1}</td>
                      <td style={{...miniTd,fontFamily:"monospace",fontSize:12,color:C.t2}}>{r.name}</td>
                      <td style={miniTd}>{r.label}</td>
                      <td style={miniTd}>
                        <span style={{display:"inline-flex",padding:"2px 8px",borderRadius:4,fontSize:11.5,fontWeight:500,background:strategyColors[r.strategy]?.bg||C.grayL,color:strategyColors[r.strategy]?.c||C.gray}}>
                          {r.strategy}
                        </span>
                      </td>
                      <td style={{...miniTd,textAlign:"center"}}>
                        <button
                          onClick={()=>setDiffRows(p=>p.map((row,j)=>j===i?{...row,removed:!row.removed}:row))}
                          style={{background:"none",border:`1px solid ${r.removed?C.grayB:C.red}`,color:r.removed?C.t3:C.red,cursor:"pointer",fontSize:11.5,borderRadius:4,padding:"2px 8px",fontWeight:500}}>
                          {r.removed?"Restore":"× Remove"}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{padding:"8px 14px",background:C.bg2,borderTop:`1px solid ${C.border}`,fontSize:12,color:C.t3,display:"flex",alignItems:"center",gap:6}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                {diffRows.filter(r=>!r.removed).length} of {diffRows.length} fields included in this activity's diff.
                Remove fields you don't want tracked.
              </div>
            </div>
          )}

          {/* ── CONTEXT QUERIES (SQL) ── */}
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${C.border}`,textTransform:"uppercase",letterSpacing:".06em"}}>Context Queries</div>
          <div style={{border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:14}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>
                <th style={miniTh}>#</th>
                <th style={miniTh}>Display Label</th>
                <th style={miniTh}>SQL Query</th>
                <th style={miniTh}></th>
              </tr></thead>
              <tbody>
                {ctxRows.map((r,i)=>(
                  <tr key={i}>
                    <td style={{...miniTd,width:32,color:C.t3}}>{i+1}</td>
                    <td style={miniTd}>
                      <input value={r.label} onChange={e=>setCtxRows(p=>{const n=[...p];n[i]={...n[i],label:e.target.value};return n;})}
                        style={{...inputS,padding:"4px 8px",fontSize:12}} placeholder="e.g. Total Affected Users"
                        onFocus={e=>e.currentTarget.style.borderColor=C.blue}
                        onBlur={e=>e.currentTarget.style.borderColor=C.grayB}/>
                    </td>
                    <td style={miniTd}>
                      <input value={r.query} onChange={e=>setCtxRows(p=>{const n=[...p];n[i]={...n[i],query:e.target.value};return n;})}
                        style={{...inputS,padding:"4px 8px",fontSize:12,fontFamily:"monospace"}} placeholder="SELECT COUNT(*) FROM ... WHERE id = {target}"
                        onFocus={e=>e.currentTarget.style.borderColor=C.blue}
                        onBlur={e=>e.currentTarget.style.borderColor=C.grayB}/>
                    </td>
                    <td style={{...miniTd,width:32}}>
                      <button onClick={()=>setCtxRows(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <button onClick={()=>setCtxRows(p=>[...p,{label:"",query:""}])}
              style={{width:"100%",padding:"8px",background:C.bg2,border:"none",borderTop:`1px solid ${C.border}`,color:C.blue,fontSize:12.5,cursor:"pointer",textAlign:"left",paddingLeft:14}}>
              + Add Context Query
            </button>
          </div>

          {/* ── ASSIGN MAKERS & CHECKERS ── */}
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`,textTransform:"uppercase",letterSpacing:".06em"}}>Assign Makers & Checkers</div>

          {/* Makers */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,color:C.t2,marginBottom:8}}>Assign Makers</div>
            <div style={{border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:14}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  <th style={miniTh}>#</th>
                  <th style={miniTh}>User ID</th>
                  <th style={miniTh}>Name</th>
                  <th style={miniTh}>Domain Key</th>
                </tr></thead>
                <tbody>
                  {makers.length===0
                    ?<tr><td colSpan={4} style={{...miniTd,color:C.t3,textAlign:"center"}}>Select a domain to see available makers</td></tr>
                    :makers.map((m,i)=>(
                      <tr key={i} style={{background:C.bg}} onMouseEnter={e=>e.currentTarget.style.background=C.bg2} onMouseLeave={e=>e.currentTarget.style.background=C.bg}>
                        <td style={{...miniTd,width:32,color:C.t3}}>{i+1}</td>
                        <td style={{...miniTd,fontFamily:"monospace",fontSize:12,color:C.t2}}>{m.userId}</td>
                        <td style={{...miniTd,fontWeight:500}}>{m.name}</td>
                        <td style={miniTd}><PermTag v={m.domainKey}/></td>
                      </tr>
                    ))
                  }
                </tbody>
              </table>
            </div>

            {/* Checkers — interactive with validation */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:600,color:C.t2}}>Assign Checkers</div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}>
                {checkers.length>0&&(
                  checkerSatisfied
                  ?<span style={{display:"flex",alignItems:"center",gap:4,color:C.greenT,fontWeight:500}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    {selectedCheckers.length} checker{selectedCheckers.length!==1?"s":""} assigned — requirement met
                  </span>
                  :<span style={{color:saveAttempted?C.red:C.t3}}>
                    Select at least {approvalCount} checker{approvalCount!==1?"s":""} (Approval Count = {approvalCount})
                  </span>
                )}
              </div>
            </div>
            <div style={{border:`1.5px solid ${saveAttempted&&!checkerSatisfied?C.red:checkerSatisfied&&checkers.length>0?C.greenT:C.border}`,borderRadius:6,overflow:"hidden",transition:"border-color .2s"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  <th style={{...miniTh,width:36}}>✓</th>
                  <th style={miniTh}>User ID</th>
                  <th style={miniTh}>Name</th>
                  <th style={miniTh}>Domain Key</th>
                  <th style={miniTh}>Status</th>
                </tr></thead>
                <tbody>
                  {checkers.length===0
                    ?<tr><td colSpan={5} style={{...miniTd,color:C.t3,textAlign:"center"}}>Select a domain to see available checkers</td></tr>
                    :checkers.map((m,i)=>{
                      const isSelected=selectedCheckers.includes(m.userId);
                      return(
                      <tr key={i} onClick={()=>toggleChecker(m.userId)} style={{background:isSelected?"#f0fdf4":C.bg,cursor:"pointer",transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background=isSelected?"#dcfce7":C.bg2} onMouseLeave={e=>e.currentTarget.style.background=isSelected?"#f0fdf4":C.bg}>
                        <td style={{...miniTd,width:36,textAlign:"center"}}>
                          <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${isSelected?C.blue:C.grayB}`,background:isSelected?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",transition:"all .12s"}}>
                            {isSelected&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                          </div>
                        </td>
                        <td style={{...miniTd,fontFamily:"monospace",fontSize:12,color:C.t2}}>{m.userId}</td>
                        <td style={{...miniTd,fontWeight:500,color:isSelected?C.text:C.t2}}>{m.name}</td>
                        <td style={miniTd}><PermTag v={m.domainKey}/></td>
                        <td style={miniTd}>
                          {isSelected
                            ?<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11.5,fontWeight:600,color:C.greenT}}>
                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                              Selected
                            </span>
                            :<span style={{fontSize:11.5,color:C.t3}}>Click to select</span>
                          }
                        </td>
                      </tr>
                      );
                    })
                  }
                </tbody>
              </table>
              {/* Inline validation error */}
              {saveAttempted&&!checkerSatisfied&&checkers.length>0&&(
                <div style={{padding:"10px 14px",background:"#fef2f2",borderTop:`1px solid #fecaca`,display:"flex",alignItems:"center",gap:8,fontSize:12.5,color:"#b91c1c"}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                  <span>
                    Unable to save activity. The number of assigned checkers (<strong>{selectedCheckers.length}</strong>) does not satisfy the configured approval count (<strong>{approvalCount}</strong>). Please select {checkerShortfall} more checker{checkerShortfall!==1?"s":""}.
                  </span>
                </div>
              )}
            </div>
          </div>

        </div>
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:C.t3}}>
            {section&&modalId?(
              <span style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{color:C.greenT}}>✓ {diffRows.filter(r=>!r.removed).length} diff · {ctxRows.filter(r=>r.label).length} ctx queries</span>
                <span style={{color:checkerSatisfied?C.greenT:saveAttempted?C.red:C.t3,fontWeight:checkerSatisfied||saveAttempted?500:400}}>
                  {checkerSatisfied
                    ?`✓ ${selectedCheckers.length}/${approvalCount} checker${approvalCount!==1?"s":""} — ready`
                    :`${selectedCheckers.length}/${approvalCount} checker${approvalCount!==1?"s":""} required`
                  }
                </span>
              </span>
            ):"Fill in domain and modal ID to configure diff fields"}
          </span>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="outline" onClick={onClose}>Cancel</Btn>
            <button onClick={handleSaveActivity} style={{padding:"7px 18px",background:checkerSatisfied&&section&&modalId?"#111827":C.grayB,color:checkerSatisfied&&section&&modalId?"#fff":C.t3,border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:checkerSatisfied&&section&&modalId?"pointer":"not-allowed",transition:"background .15s"}}>
              Save Activity
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GMC CONFIGS VIEW
═══════════════════════════════════════ */
const ACTIVITY_CONFIGS=[
  {id:"ACT_CT_001",name:"Manage Template Edit",section:"Communication",queries:"3 diff, 4 ctx",sla:"4 hrs",warn:"80% (192 min)",status:"Active"},
];
const ROLE_CONFIGS=[
  {userId:"usr_001",actId:"ACT_CT_001",flow:"Manage Template Edit",section:"Communication",makerPerm:"gmc:view, communication:manage",checkerPerm:"gmc:manage, communication:manage"},
];

function GMCConfigsView(){
  const [showCreate,setShowCreate]=useState(false);
  const [showFilters,setShowFilters]=useState(false);
  const [statusFilter,setStatusFilter]=useState("");
  const [sectionFilter,setSectionFilter]=useState("");
  const [searchQ,setSearchQ]=useState("");
  const labelS={fontSize:12.5,fontWeight:500,color:C.text,marginBottom:5,display:"block"};
  const inputS={width:"100%",padding:"7px 10px",border:`1px solid ${C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none"};
  const filtered=ACTIVITY_CONFIGS.filter(a=>{
    if(statusFilter&&a.status!==statusFilter)return false;
    if(sectionFilter&&a.section!==sectionFilter)return false;
    if(searchQ&&!a.id.toLowerCase().includes(searchQ.toLowerCase())&&!a.name.toLowerCase().includes(searchQ.toLowerCase()))return false;
    return true;
  });
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",padding:"20px 24px 12px",flexShrink:0}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:C.text,lineHeight:1.2,marginBottom:4}}>Configs</div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12.5,color:C.t3}}>
            <span style={{cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.color=C.blue} onMouseLeave={e=>e.currentTarget.style.color=C.t3}>GMC</span>
            <span style={{fontSize:11}}>›</span>
            <span style={{color:C.t2}}>Configs</span>
          </div>

            </div>
          </div>

            <div style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6}}>Section</div>

            </div>
          </div>
        </div>
      )}
      {/* Unified Table */}
      <div style={{flex:1,overflowY:"auto",padding:"0 24px"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={thS}>Activity ID</th><th style={thS}>Activity / Flow Name</th>
            <th style={thS}>Section</th><th style={thS}>Queries</th>
            <th style={thS}>SLA</th><th style={thS}>Warning Time</th>
            <th style={thS}>Approval Count</th><th style={thS}>Status</th><th style={thSL}>Actions</th>
          </tr></thead>
          <tbody>{filtered.length===0?<tr><td colSpan={8} style={{...tdS,textAlign:"center",color:C.t3}}>No activities found</td></tr>:filtered.map(a=>(
            <tr key={a.id} style={{background:C.bg,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=C.bg2} onMouseLeave={e=>e.currentTarget.style.background=C.bg}>
              <td style={{...tdS,fontFamily:"monospace",fontSize:12,color:C.t2}}>{a.id}</td>
              <td style={tdS}>{a.name}</td>
              <td style={tdS}>{a.section}</td>
              <td style={{...tdS,color:C.t2}}>{a.queries}</td>
              <td style={tdS}>{a.sla}</td>
              <td style={{...tdS,color:C.t2}}>{a.warn}</td>
              <td style={{...tdS,textAlign:"center"}}>
                <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:"50%",background:a.approvalCount>1?C.blueL:C.grayL,color:a.approvalCount>1?C.blue:C.gray,fontSize:12,fontWeight:700}}>{a.approvalCount||1}</span>
              </td>
              <td style={tdS}><Badge v={a.status}/></td>
              <td style={{...tdS,textAlign:"right"}}>
                <DotMenu items={[["View",C.blue,null],["Edit",C.blue,null],["Deactivate",C.red,null]]}/>
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 24px",background:C.bg,borderTop:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{fontSize:12.5,color:C.t2}}>Showing 1–{filtered.length} of {ACTIVITY_CONFIGS.length}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12.5,color:C.t2}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:C.blue}}/><span>Page 1 of 1</span></div>
          {["›","»"].map(a=><button key={a} style={{width:26,height:26,border:`1px solid ${C.grayB}`,borderRadius:4,background:C.bg,color:C.t3,cursor:"pointer",fontSize:13}}>{a}</button>)}
        </div>
      </div>
      {showCreate&&<CreateActivityModal onClose={()=>setShowCreate(false)}/>}

    </div>
  );
}

function Toast2({msg,onClose}){

  return(
    <div style={{position:"fixed",bottom:24,right:24,background:"#111827",color:"#fff",padding:"11px 16px",borderRadius:8,fontSize:12.5,boxShadow:"0 4px 20px rgba(0,0,0,.25)",zIndex:999,display:"flex",alignItems:"center",gap:8}}>

      {msg}
      <button onClick={onClose} style={{marginLeft:8,background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
    </div>
  );
}

function ConsumerDetail({consumer,onClose,onLogAdd}){
  const [acctTypeId,setAcctTypeId]=useState(consumer.acctTypeId);
  const [acctTypeName,setAcctTypeName]=useState(consumer.acctTypeName);
  const [dropOpen,setDropOpen]=useState(false);
  const [search,setSearch]=useState("");
  const [showFreezeForm,setShowFreezeForm]=useState(false);
  const [freezeReason,setFreezeReason]=useState("");
  const [showGMC,setShowGMC]=useState(false);
  const [gmcAction,setGmcAction]=useState(null);
  const [pendingDiff,setPendingDiff]=useState([]);
  const [toast,setToast]=useState(null);
  const [frozen,setFrozen]=useState(consumer.frozen);

  const filteredTypes=ACCT_TYPES.filter(t=>t.name.toLowerCase().includes(search.toLowerCase())||String(t.id).includes(search));

  const handleTypeSelect=(t)=>{
    setDropOpen(false);
    setSearch("");
    setPendingDiff([{field:"Account Type ID",old:`${acctTypeId} — ${acctTypeName}`,nw:`${t.id} — ${t.name}`,changed:true}]);
    setGmcAction("acct-type");
    setShowGMC(true);
  };

  const handleFreezeSubmit=()=>{
    setPendingDiff([{field:"Account Status",old:"Active",nw:"Freeze Initiated",changed:true}]);
    setGmcAction("freeze");
    setShowGMC(true);
  };

  const handleGMCConfirm=(reason,ctx)=>{
    const isFreeze=gmcAction==="freeze";
    const newId=`REQ_${1210+Math.floor(Math.random()*90)}`;
    onLogAdd({
      id:newId,activityId:isFreeze?"ACT_PAY_002":"ACT_PAY_001",
      flowName:isFreeze?"Freeze Account":"Account Type ID Change",
      domain:"Payments",maker:"Utkarsh Giri",date:fmtDate(),status:"Pending",
      targetId:`CONS_${consumer.id}`,category:"Payments — User Accounts",
      action:isFreeze?"Freeze Account":"Account Type ID Change",
      reason,context:ctx,atts:[],diff:pendingDiff,
      ctxData:[
        {l:"Account Type Name",v:acctTypeName},{l:"Wallet Balance Limit",v:consumer.walletLimit},
        {l:"Daily Outgoing Limit",v:consumer.dailyOutgoing},{l:"Monthly Incoming Limit",v:consumer.monthlyIncoming},
        {l:"Allowed Transaction Types",v:"Bank Transfer, Scan & Pay, Bill Payments"},
        {l:"Applicable Charges",v:"Standard — 1.2% per transaction"},
      ],
      checkerRemark:"",checkerName:"",checkerDate:"",targetTemplateId:null,
    });
    setShowGMC(false);setShowFreezeForm(false);setFreezeReason("");
    setToast(`Request ${newId} submitted for approval. Checker has been notified.`);
  };

  const sectionStyle={background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"20px 24px",marginBottom:16};
  const labelStyle={fontSize:12,color:C.t3,marginBottom:4};
  const valueStyle={fontSize:13.5,color:C.text,fontWeight:500};

  if(showFreezeForm){
    return(
      <div style={{position:"absolute",inset:0,background:C.bg,display:"flex",flexDirection:"column",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px 12px",borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:C.text}}>Consumer Details</div>
            <div style={{display:"flex",gap:5,fontSize:12.5,color:C.t3,marginTop:3}}>
              <span style={{color:C.blue,cursor:"pointer"}}>Payments</span><span>›</span>
              <span style={{color:C.blue,cursor:"pointer"}}>User Accounts</span><span>›</span>
              <span style={{color:C.blue,cursor:"pointer"}}>Consumers</span><span>›</span>
              <span>{consumer.id}</span>
            </div>
          </div>
          <button onClick={()=>setShowFreezeForm(false)} style={{padding:"6px 16px",background:C.red,color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer"}}>Cancel</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"24px"}}>
          <textarea value={freezeReason} onChange={e=>setFreezeReason(e.target.value)} placeholder="Enter reason for freezing..." style={{width:"100%",minHeight:140,border:`1px solid ${freezeReason?"#e5e7eb":"#fca5a5"}`,borderRadius:8,padding:"12px 14px",fontSize:13,color:C.text,background:freezeReason?"#fff":"#fff8f8",outline:"none",resize:"vertical",fontFamily:"inherit"}} onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=freezeReason?"#e5e7eb":"#fca5a5";e.currentTarget.style.boxShadow="none";}}/>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}>
            <button disabled={!freezeReason.trim()} onClick={handleFreezeSubmit} style={{padding:"8px 24px",background:freezeReason.trim()?C.red:"#fca5a5",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:freezeReason.trim()?"pointer":"not-allowed"}}>Submit Freeze</button>
          </div>
        </div>
        {showGMC&&<GMCReasoningModal diff={pendingDiff} onConfirm={handleGMCConfirm} onCancel={()=>setShowGMC(false)}/>}
        {toast&&<Toast2 msg={toast} onClose={()=>setToast(null)}/>}
      </div>
    );
  }

  return(
    <div style={{position:"absolute",inset:0,background:C.bg,display:"flex",flexDirection:"column",overflowY:"auto",zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px 12px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.blue,fontSize:13,padding:0,display:"flex",alignItems:"center",gap:4}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div style={{fontSize:16,fontWeight:700,color:C.text}}>Consumer Details</div>
          </div>
          <div style={{display:"flex",gap:5,fontSize:12.5,color:C.t3,marginTop:3,marginLeft:22}}>
            <span style={{color:C.blue,cursor:"pointer"}}>Payments</span><span>›</span>
            <span style={{color:C.blue,cursor:"pointer"}}>User Accounts</span><span>›</span>
            <span style={{color:C.blue,cursor:"pointer"}}>Consumers</span><span>›</span>
            <span style={{color:C.t2,fontWeight:500}}>{consumer.id}</span>
          </div>
        </div>
        <button onClick={()=>setShowFreezeForm(true)} style={{padding:"7px 18px",background:C.red,color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer"}}>Freeze Account</button>
      </div>

      <div style={{padding:"20px 24px",flex:1}}>
        {/* User Information */}
        <div style={sectionStyle}>
          <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:16}}>User Information</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px 40px"}}>
            {[["First Name",consumer.firstName],["Middle Name",consumer.middleName||"—"],["Last Name",consumer.lastName],["User ID",consumer.userId],["Full Name",consumer.fullName]].map(([l,v])=>(
              <div key={l}><div style={labelStyle}>{l}</div><div style={valueStyle}>{v}</div></div>
            ))}
          </div>
        </div>

        {/* Account Information */}
        <div style={sectionStyle}>
          <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:16}}>Account Information</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px 40px"}}>
            {/* Account Type ID with dropdown */}
            <div style={{position:"relative"}}>
              <div style={labelStyle}>Account Type ID</div>
              {!dropOpen?(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",border:`1px solid ${C.border}`,borderRadius:6,background:"#f8faff",minWidth:200}}>
                    <span style={{fontSize:12,color:C.blue,fontWeight:600}}>{acctTypeId}</span>
                    <span style={{fontSize:13,color:C.text}}>{acctTypeName}</span>
                    <svg style={{marginLeft:"auto"}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
                  </div>
                  <button onClick={()=>setDropOpen(true)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:5,padding:"5px 8px",cursor:"pointer",color:C.blue,fontSize:12}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>
                </div>
              ):(
                <div style={{border:`1px solid ${C.blue}`,borderRadius:8,background:C.bg,boxShadow:"0 4px 16px rgba(0,0,0,.1)",width:260,zIndex:50}}>
                  <div style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}`}}>
                    <input autoFocus value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search Account Type ID..." style={{width:"100%",border:"none",outline:"none",fontSize:12.5,color:C.text,background:"transparent"}}/>
                  </div>
                  {filteredTypes.map(t=>(
                    <div key={t.id} onClick={()=>handleTypeSelect(t)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",cursor:"pointer",background:t.id===acctTypeId?"#eff6ff":"transparent",borderLeft:t.id===acctTypeId?`3px solid ${C.blue}`:"3px solid transparent"}}
                      onMouseEnter={e=>{if(t.id!==acctTypeId)e.currentTarget.style.background=C.bg2}} onMouseLeave={e=>{if(t.id!==acctTypeId)e.currentTarget.style.background="transparent"}}>
                      {t.id===acctTypeId&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>}
                      <span style={{fontSize:12,color:C.t3,minWidth:20}}>{t.id}</span>
                      <span style={{fontSize:13,color:t.id===acctTypeId?C.blue:C.text,fontWeight:t.id===acctTypeId?600:400}}>{t.name}</span>
                    </div>
                  ))}
                  <div style={{padding:"8px 12px",borderTop:`1px solid ${C.border}`}}>
                    <button onClick={()=>{setDropOpen(false);setSearch("");}} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:12}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
            {[["Account ID",consumer.acctId],["Phone Number",consumer.phone],["Ledger Account ID",<span style={{color:C.blue,fontSize:12,fontFamily:"monospace"}}>{consumer.ledgerAcctId}</span>],["Ledger ID",<span style={{fontFamily:"monospace",fontSize:12}}>{consumer.ledgerId}</span>],["Status",<Badge v={consumer.status}/>],["Created At",consumer.createdAt],["Updated At",consumer.updatedAt],["UUID",<span style={{fontFamily:"monospace",fontSize:11,color:C.t2}}>{consumer.uuid}</span>]].map(([l,v])=>(
              <div key={l}><div style={labelStyle}>{l}</div><div style={valueStyle}>{v}</div></div>
            ))}
          </div>
        </div>

        {/* Account Type Limits & Eligibility */}
        <div style={sectionStyle}>
          <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}}>Account Type Limits & Eligibility</div>
          <div style={{fontSize:12,color:C.t3,marginBottom:16}}>Transaction Limits</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px 40px",marginBottom:20}}>
            {[["Wallet Balance Limit",consumer.walletLimit],["Daily Outgoing Limit",consumer.dailyOutgoing],["Monthly Incoming Limit",consumer.monthlyIncoming]].map(([l,v])=>(
              <div key={l}><div style={labelStyle}>{l}</div><div style={valueStyle}>{v}</div></div>
            ))}
          </div>
          <div style={{fontSize:12,color:C.t3,marginBottom:10}}>Payment Types</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[["Bank Transfer",true],["Scan and Pay",true],["Bill Payments",true],["Cash In",false],["Mobile Load",true]].map(([l,v])=>(
              <label key={l} style={{display:"flex",alignItems:"center",gap:7,fontSize:13,color:v?C.text:C.t3,cursor:"default"}}>
                <input type="checkbox" checked={v} readOnly style={{accentColor:C.blue}}/>{l}
              </label>
            ))}
          </div>
        </div>
      </div>

      {showGMC&&<GMCReasoningModal diff={pendingDiff} onConfirm={handleGMCConfirm} onCancel={()=>setShowGMC(false)}/>}
      {toast&&<Toast2 msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

  const tdS2={padding:"14px 16px",borderBottom:`1px solid ${C.border}`,fontSize:13,color:C.text,verticalAlign:"middle"};

    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>

      <div style={{padding:"20px 24px 12px",flexShrink:0}}>
        <div style={{fontSize:22,fontWeight:700,color:C.text,marginBottom:4}}>Manual Transfer</div>

            Search by <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginLeft:4}}><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 10px"}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

            Show Filters
          </button>
        </div>
      </div>
      {/* Table */}
      <div style={{flex:1,overflowY:"auto",padding:"0 24px"}}>
        <table style={{width:"100%",borderCollapse:"collapse",background:C.bg}}>
          <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
            <th style={thS2}>TXN CODE</th><th style={thS2}>SOURCE ACCOUNT ID</th>

function EditConstraintModal({constraint,onClose,onLogAdd,onToast}){
  const [status,setStatus]=useState(constraint.status==="Active");
  const [groups,setGroups]=useState({consumer:true,merchant:true,seller:true});
  const [minAmt,setMinAmt]=useState(constraint.minAmount.replace("₱","").replace(",",""));
  const [maxAmt,setMaxAmt]=useState(constraint.maxAmount.replace("₱","").replace(",",""));
  const [send,setSend]=useState(constraint.send);
  const [receive,setReceive]=useState(constraint.receive);
  const [showGMC,setShowGMC]=useState(false);
  const dirty=true;
  const diff=[];
  if(maxAmt!==constraint.maxAmount.replace("₱","").replace(",",""))diff.push({field:"Max Amount",old:constraint.maxAmount,nw:`₱${maxAmt}`,changed:true});
  if(minAmt!==constraint.minAmount.replace("₱","").replace(",",""))diff.push({field:"Min Amount",old:constraint.minAmount,nw:`₱${minAmt}`,changed:true});
  if(diff.length===0)diff.push({field:"Constraint",old:"Unchanged",nw:"Updated",changed:true});
  const inputStyle={width:"100%",padding:"10px 12px",border:`1px solid ${C.grayB}`,borderRadius:7,fontSize:13,color:C.text,background:C.bg,outline:"none"};
  const handleGMCConfirm=(reason,ctx)=>{
    const newId=`REQ_${1240+Math.floor(Math.random()*90)}`;
    onLogAdd({id:newId,activityId:"ACT_PAY_005",approvalCount:1,approvalsReceived:0,flowName:"Edit Account Type Constraint",domain:"Payments",maker:"Utkarsh Giri",date:fmtDate(),status:"Pending",targetId:`CONS_${constraint.id}`,category:"Payments — Configs",action:"Edit Account Type Constraint",reason,context:ctx,atts:[],diff,ctxData:[{l:"Account Type Name",v:constraint.at?.name||"UTKARSH_BAWA_0"},{l:"Account Type Group",v:"Consumer"},{l:"Wallet Balance Limit",v:"₱100,000"},{l:"Daily Outgoing Limit",v:"₱10,000"},{l:"Monthly Incoming Limit",v:"₱100,000"}],checkerRemark:"",checkerName:"",checkerDate:"",targetTemplateId:null});
    setShowGMC(false);onClose();onToast(`Request ${newId} submitted for approval.`);
  };
  const grpList=Object.entries(groups).filter(([,v])=>v).map(([k])=>k.charAt(0).toUpperCase()+k.slice(1)).join(", ")||"None";
  return(
    <>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:40}}>
      <div style={{background:C.bg,borderRadius:8,width:480,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,.2)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:600,color:C.text}}>Edit Constraint ID: {constraint.id}</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.t3}}>×</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
          {/* Status toggle */}
          <div style={{marginBottom:18,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13,fontWeight:500,color:C.text}}>Status</span>
            <div onClick={()=>setStatus(s=>!s)} style={{width:38,height:22,borderRadius:11,background:status?C.blue:C.grayB,cursor:"pointer",position:"relative",transition:"background .15s"}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:status?18:2,transition:"left .15s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
            </div>
          </div>
          {/* Destination Groups */}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6,display:"block"}}>Destination Accounts Group</label>
            <div style={{border:`1px solid ${C.blue}`,borderRadius:7,overflow:"hidden"}}>
              <div style={{padding:"8px 12px",background:C.bg,fontSize:13,color:C.t2}}>{grpList} <span style={{float:"right",color:C.t3,fontSize:12}}>▼</span></div>
              {["consumer","merchant","seller"].map(g=>(
                <label key={g} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",cursor:"pointer",borderTop:`1px solid ${C.border}`,background:groups[g]?C.blueL:"transparent"}}>
                  <input type="checkbox" checked={groups[g]} onChange={e=>setGroups(prev=>({...prev,[g]:e.target.checked}))} style={{accentColor:C.blue}}/>
                  <span style={{fontSize:13,fontWeight:500,color:groups[g]?C.blue:C.text}}>{g.toUpperCase()}</span>
                </label>
              ))}
            </div>
          </div>
          {/* Min/Max Amount */}
          {[["Min Amount",minAmt,setMinAmt],["Max Amount",maxAmt,setMaxAmt]].map(([l,v,s])=>(
            <div key={l} style={{marginBottom:14}}>
              <label style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6,display:"block"}}>{l}</label>
              <input type="number" value={v} onChange={e=>s(e.target.value)} style={inputStyle} onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            </div>
          ))}
          {/* Money Movement */}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:8,display:"block"}}>Money Movement</label>
            <div style={{display:"flex",gap:16}}>
              {[["Send",send,setSend],["Receive",receive,setReceive]].map(([l,v,s])=>(
                <label key={l} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:13}}>
                  <input type="checkbox" checked={v} onChange={e=>s(e.target.checked)} style={{accentColor:C.blue}}/>{l}
                </label>
              ))}
            </div>
          </div>
        </div>
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn variant="outline" onClick={onClose}>Cancel</Btn>
          <button onClick={()=>setShowGMC(true)} style={{padding:"7px 20px",background:"#111827",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer"}}>Update</button>
        </div>
      </div>
    </div>
    {showGMC&&<GMCReasoningModal diff={diff} onConfirm={handleGMCConfirm} onCancel={()=>setShowGMC(false)}/>}
    </>
  );
}

          </div>
          {/* Verification */}
          <label style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",fontSize:12.5,color:C.text,lineHeight:1.5}}>
            <input type="checkbox" checked={verified} onChange={e=>setVerified(e.target.checked)} style={{accentColor:C.blue,marginTop:2}}/>
            I have verified that the documents submitted by the user matches their KYC records recorded during their registration with SMART Money app.
          </label>
        </div>
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn variant="outline" onClick={onClose}>Cancel</Btn>
          <button disabled={!canConfirm} onClick={()=>canConfirm&&setStep(2)} style={{padding:"7px 20px",background:canConfirm?"#111827":C.grayB,color:canConfirm?"#fff":C.t3,border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:canConfirm?"pointer":"not-allowed"}}>Confirm</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState("gmc-logs");
  const [templates,setTemplates]=useState(INIT_TEMPLATES);
  const [logs,setLogs]=useState(ALL_INIT_LOGS);

  const handleTemplateUpdate=(id,form)=>{
    setTemplates(p=>p.map(t=>t.id===id?{...t,...form,title:form.subject||t.title}:t));
  };
  const handleLogAdd=(log)=>{
    setLogs(p=>[log,...p]);
  };
  const pendingCount=logs.filter(r=>r.status==="Pending").length;

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
      <Sidebar page={page} onPage={setPage} pendingCount={pendingCount}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:C.bg,position:"relative"}}>
        {page==="manage-template"&&<ManageTemplateView templates={templates} onTemplateUpdate={handleTemplateUpdate} onLogAdd={handleLogAdd}/>}
        {page==="gmc-logs"&&<GMCLogsView logs={logs} setLogs={setLogs} templates={templates} setTemplates={setTemplates}/>}
        {page==="gmc-configs"&&<GMCConfigsView/>}
        {page==="pay-consumers"&&<ConsumersView onLogAdd={handleLogAdd} onPage={setPage}/>}
        {page==="pay-manual-transfer"&&<ManualTransferView onLogAdd={handleLogAdd}/>}
        {page==="pay-account-types"&&<AccountTypesView onLogAdd={handleLogAdd}/>}
        {page==="kyc-customers"&&<KycCustomersView onLogAdd={handleLogAdd}/>}
        {page!=="manage-template"&&page!=="gmc-logs"&&page!=="gmc-configs"&&page!=="pay-consumers"&&page!=="pay-manual-transfer"&&page!=="pay-account-types"&&page!=="kyc-customers"&&(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.t3,fontSize:13,flexDirection:"column",gap:8}}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Select a section from the sidebar</span>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

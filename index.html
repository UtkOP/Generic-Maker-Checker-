/* ═══════════════════════════════════════
   BADGE COMPONENT
═══════════════════════════════════════ */
const TS={Email:{bg:C.blueL,c:C.blue,b:C.blueM},Push:{bg:C.purpleL,c:C.purple,b:C.purpleB},Sms:{bg:C.greenL,c:C.greenT,b:C.greenB},SMS:{bg:C.greenL,c:C.greenT,b:C.greenB}};
const SS={Active:{bg:C.greenL,c:C.greenT,b:C.greenB},Inactive:{bg:C.grayL,c:C.gray,b:C.grayB},Error:{bg:C.redL,c:C.redT,b:C.redB},Yes:{bg:C.greenL,c:C.greenT,b:C.greenB},No:{bg:C.redL,c:C.redT,b:C.redB}};
function Badge({v,sx={}}){const s=TS[v]||SS[v]||{bg:C.grayL,c:C.gray,b:C.grayB};return<span style={{display:"inline-flex",alignItems:"center",padding:"2px 8px",borderRadius:4,fontSize:12,fontWeight:500,background:s.bg,color:s.c,border:`1px solid ${s.b}`,...sx}}>{v}</span>;}

/* ═══════════════════════════════════════
   SHARED ATOMS
═══════════════════════════════════════ */
function Btn({children,variant="dark",onClick,sx={},disabled}){
  const vs={dark:{background:"#111827",color:"#fff",border:"none"},outline:{background:C.bg,border:`1px solid ${C.grayB}`,color:C.t2},blue:{background:C.blue,color:"#fff",border:"none"},ghost:{background:"transparent",border:"none",color:C.t2}};
  return<button disabled={disabled} onClick={onClick} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,fontWeight:500,borderRadius:7,cursor:disabled?"not-allowed":"pointer",fontSize:13,padding:"7px 16px",transition:"opacity .12s",opacity:disabled?0.5:1,...vs[variant],...sx}} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity=".85"}} onMouseLeave={e=>{if(!disabled)e.currentTarget.style.opacity="1"}}>{children}</button>;
}
function Inp({placeholder,type="text",value,onChange,sx={}}){
  return<input type={type} placeholder={placeholder} value={value} onChange={onChange}
    style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",...sx}}
    onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`}}
    onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none"}}/>;
}
function Sel({options,value,onChange,sx={}}){
  return<select value={value} onChange={onChange}
    style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",cursor:"pointer",...sx}}>
    {options.map(o=><option key={o}>{o}</option>)}
  </select>;
}

/* ═══════════════════════════════════════
   DOT MENU
═══════════════════════════════════════ */
function DotMenu({items}){
  const [open,setOpen]=useState(false);const ref=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  return<div ref={ref} style={{position:"relative",display:"inline-block"}} onClick={e=>e.stopPropagation()}>
    <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.t3,padding:"1px 6px",letterSpacing:"2px",lineHeight:1,borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.background=C.bg2} onMouseLeave={e=>e.currentTarget.style.background="none"}>⋮</button>
    {open&&<div style={{position:"absolute",right:0,top:24,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,.1)",minWidth:165,zIndex:100,padding:"4px 0"}}>
      {items.map(([l,col,fn])=><button key={l} onClick={()=>{fn&&fn();setOpen(false)}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"7px 14px",fontSize:12.5,color:col||C.blue,background:"none",border:"none",cursor:"pointer",textAlign:"left"}} onMouseEnter={e=>e.currentTarget.style.background=C.bg2} onMouseLeave={e=>e.currentTarget.style.background="none"}>{l}</button>)}
    </div>}
  </div>;
}

/* ═══════════════════════════════════════
   WORD COUNT HELPER
═══════════════════════════════════════ */
function countWords(str){
  const trimmed=str.trim();
  if(!trimmed)return 0;
  return trimmed.split(/\s+/).length;
}
const WORD_LIMIT=100;

/* ═══════════════════════════════════════
   VALIDATION TOAST (inline, for modal)
═══════════════════════════════════════ */
function ValidationToast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:"fixed",bottom:24,right:24,background:C.redT,color:"#fff",padding:"11px 16px",borderRadius:8,fontSize:12.5,boxShadow:"0 4px 20px rgba(0,0,0,.28)",zIndex:10001,display:"flex",alignItems:"flex-start",gap:10,maxWidth:380}}>

      <div style={{flex:1,lineHeight:1.5}}>{msg}</div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0}}>×</button>
    </div>
  );
}

/* ═══════════════════════════════════════
   GMC REASONING MODAL
   scenario prop:
     undefined   → normal flow (creates request on confirm)
     "permission" → simulates Step B role failure on confirm
     "input"      → enables word-count + file validation (live)
     "duplicate"  → simulates Step C duplicate guard on confirm
═══════════════════════════════════════ */
function GMCReasoningModal({diff,onConfirm,onCancel,reasonOnly=false,scenario=null}){
  const [reason,setReason]=useState("");
  const [ctx,setCtx]=useState("");
  const [reasonErr,setReasonErr]=useState("");
  const [ctxErr,setCtxErr]=useState("");
  const [fileErr,setFileErr]=useState("");
  const [fileCount,setFileCount]=useState(0);
  const [validationToast,setValidationToast]=useState(null);
  const [permLoading,setPermLoading]=useState(false);
  const [dupLoading,setDupLoading]=useState(false);

  const reasonWords=countWords(reason);
  const ctxWords=countWords(ctx);
  const reasonOver=reasonWords>WORD_LIMIT;
  const ctxOver=ctxWords>WORD_LIMIT;

  /* ── Simulated file add (input validation scenario) ── */
  const handleAddFile=()=>{
    if(scenario==="input"){
      const newCount=fileCount+1;
      if(newCount>3){
        setFileErr("You can attach a maximum of 3 files. Remove one before adding another.");
        return;
      }
      setFileCount(newCount);
      setFileErr("");
    }
  };

  const handleConfirm=()=>{
    /* Reset errors */
    setReasonErr(""); setCtxErr(""); setFileErr("");

    /* ── Input validation scenario ── */
    if(scenario==="input"){
      let blocked=false;
      if(!reason.trim()){setReasonErr("Reason is required.");blocked=true;}
      else if(reasonOver){setReasonErr(`Reason must not exceed ${WORD_LIMIT} words. Currently ${reasonWords} words.`);blocked=true;}
      if(ctxOver){setCtxErr(`Context must not exceed ${WORD_LIMIT} words. Currently ${ctxWords} words.`);blocked=true;}
      if(fileCount>3){setFileErr("You can attach a maximum of 3 files.");blocked=true;}
      if(blocked){
        const parts=[];
        if(reasonErr||(!reason.trim())||reasonOver) parts.push("Reason: "+(!reason.trim()?"required":reasonOver?`exceeds ${WORD_LIMIT}-word limit (${reasonWords} words)`:""));
        if(ctxOver) parts.push(`Context: exceeds ${WORD_LIMIT}-word limit (${ctxWords} words)`);
        if(fileCount>3) parts.push("Attachments: max 3 files allowed");
        setValidationToast("Request creation blocked. "+parts.filter(Boolean).join(". ")+".");
        return;
      }
    }

    /* ── Permission validation scenario ── */
    if(scenario==="permission"){
      if(!reason.trim()){setReasonErr("Reason is required.");return;}
      setPermLoading(true);
      setTimeout(()=>{
        setPermLoading(false);
        /* Simulates API 1 Step B failure */
        setValidationToast("Request could not be created. You do not have access to perform this activity.");
        /* Modal stays open — no request created */
      },900);
      return;
    }

    /* ── Duplicate guard scenario ── */
    if(scenario==="duplicate"){
      if(!reason.trim()){setReasonErr("Reason is required.");return;}
      setDupLoading(true);
      setTimeout(()=>{
        setDupLoading(false);
        setValidationToast("DUPLICATE_PENDING");
      },700);
      return;
    }

    /* ── Normal validation ── */
    if(!reason.trim()){setReasonErr("Reason is required.");return;}
    if(reasonOver){setReasonErr(`Reason must not exceed ${WORD_LIMIT} words. Currently ${reasonWords} words.`);return;}
    if(ctxOver){setCtxErr(`Context must not exceed ${WORD_LIMIT} words. Currently ${ctxWords} words.`);return;}
    onConfirm(reason,ctx);
  };

  const isDupToast=validationToast==="DUPLICATE_PENDING";

  return(
    <>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10000}}>
      <div style={{background:C.bg,borderRadius:8,width:520,maxWidth:"96%",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 4px 24px rgba(0,0,0,.18)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 12px",borderBottom:`1px solid ${C.border}`}}>
          <div>
            <span style={{fontSize:15,fontWeight:600,color:C.text}}>Submit Request</span>
            {scenario&&<span style={{marginLeft:10,fontSize:11,padding:"2px 8px",borderRadius:4,background:scenario==="permission"?C.redL:scenario==="input"?C.amberL:C.blueL,color:scenario==="permission"?C.redT:scenario==="input"?C.amberT:C.blue,border:`1px solid ${scenario==="permission"?C.redB:scenario==="input"?C.amberB:C.blueM}`,fontWeight:500}}>
              {scenario==="input"?"Input Validation":scenario==="duplicate"?"Duplicate Guard":""}
            </span>}
          </div>
          <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.t3,lineHeight:1}}>×</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"0 20px 16px"}}>
          {/* Diff preview */}
          <div style={{margin:"14px 0",padding:"10px 14px",background:C.bg2,borderRadius:6,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,fontWeight:600,color:C.t2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Changes Detected</div>
            {diff.filter(d=>d.changed).slice(0,4).map((d,i)=>{const oldVal=d.old||"—";return(<div key={i} style={{fontSize:12.5,color:C.text,marginBottom:4}}><span style={{fontWeight:600}}>{d.field}:</span> <span style={{color:C.t3,textDecoration:"line-through",marginRight:6}}>{oldVal.length>40?oldVal.substring(0,40)+"…":oldVal}</span><span style={{color:C.green}}>→ {(d.nw||"Modified").length>40?(d.nw||"Modified").substring(0,40)+"…":(d.nw||"Modified")}</span></div>);})}
          </div>

          {/* Reason */}
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12.5,fontWeight:500,color:C.text}}>Reason <span style={{color:C.red}}>*</span></span>
              <span style={{fontSize:11.5,color:reasonOver?C.red:reasonWords>80?C.amber:C.t3,fontWeight:reasonOver?600:400}}>{reasonWords}/{WORD_LIMIT} words</span>
            </div>
            <textarea value={reason} onChange={e=>{setReason(e.target.value);setReasonErr("");}} placeholder="Enter reason for this change..." style={{width:"100%",padding:"8px 10px",border:`1px solid ${reasonErr||reasonOver?C.red:C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",resize:"vertical",minHeight:80,fontFamily:"inherit"}} onFocus={e=>{e.currentTarget.style.borderColor=reasonErr||reasonOver?C.red:C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${reasonOver?C.redL:C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=reasonErr||reasonOver?C.red:C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            {reasonErr&&<div style={{fontSize:12,color:C.red,marginTop:4,display:"flex",alignItems:"center",gap:4}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>{reasonErr}</div>}
          </div>

          {/* Context + Attachments — hidden for reasonOnly flows */}

            </div>
            <textarea value={ctx} onChange={e=>{setCtx(e.target.value);setCtxErr("");}} placeholder="Include all evidences and links. May be used for audit purposes." style={{width:"100%",padding:"8px 10px",border:`1px solid ${ctxErr||ctxOver?C.red:C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",resize:"vertical",minHeight:70,fontFamily:"inherit"}} onFocus={e=>{e.currentTarget.style.borderColor=ctxErr||ctxOver?C.red:C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${ctxOver?C.redL:C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=ctxErr||ctxOver?C.red:C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            {ctxErr&&<div style={{fontSize:12,color:C.red,marginTop:4,display:"flex",alignItems:"center",gap:4}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>{ctxErr}</div>}
          </div>

          {/* Supporting Documents */}
          <div style={{marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12.5,fontWeight:500,color:C.text}}>Supporting Documents <span style={{fontSize:12,color:C.t3,fontWeight:400}}>(Optional · max 3 files · max 3 MB each)</span></span>
              {scenario==="input"&&<span style={{fontSize:11.5,color:fileCount>=3?C.red:C.t3}}>{fileCount}/3 files</span>}
            </div>
            {scenario==="input"?(
              /* Interactive file demo for input validation scenario */
              <div>
                {Array.from({length:fileCount}).map((_,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:6,background:C.bg2,marginBottom:6}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.t2} strokeWidth="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span style={{fontSize:12.5,color:C.text,flex:1}}>document_{i+1}.pdf</span>
                    <span style={{fontSize:11.5,color:C.t3}}>2.1 MB</span>
                    <button onClick={()=>setFileCount(c=>Math.max(0,c-1))} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:15,lineHeight:1}}>×</button>
                  </div>
                ))}
                <div onClick={handleAddFile} style={{border:`1.5px dashed ${fileCount>=3?C.red:C.grayB}`,borderRadius:6,padding:"12px",textAlign:"center",cursor:fileCount>=3?"not-allowed":"pointer",color:fileCount>=3?C.red:C.t3,fontSize:12.5,transition:"all .12s"}} onMouseEnter={e=>{if(fileCount<3)e.currentTarget.style.borderColor=C.blue;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=fileCount>=3?C.red:C.grayB;}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={{display:"block",margin:"0 auto 4px"}}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  {fileCount>=3?"Maximum 3 files reached":"Add File (click to simulate)"}
                </div>
                {fileErr&&<div style={{fontSize:12,color:C.red,marginTop:6,display:"flex",alignItems:"center",gap:4}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>{fileErr}</div>}
              </div>
            ):(
              <div style={{border:`1.5px dashed ${C.grayB}`,borderRadius:6,padding:"14px",textAlign:"center",cursor:"pointer",color:C.t3,fontSize:12.5}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.blue} onMouseLeave={e=>e.currentTarget.style.borderColor=C.grayB}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",margin:"0 auto 6px"}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

            )}
          </div>
          </>}

          {/* reasonOnly note */}
          {reasonOnly&&<div style={{padding:"10px 14px",background:"#f0fdf4",border:`1px solid #bbf7d0`,borderRadius:6,fontSize:12.5,color:"#15803d",display:"flex",alignItems:"flex-start",gap:8,marginTop:10}}>

            <span>Description and proof of payment from the form will be automatically attached to this request for the checker.</span>

        </div>

        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>

  if(hidden.length===0)return null;
  const pHdr2={background:"#EDE9FF",padding:"8px 12px",fontWeight:600,fontSize:12.5,color:"#3B3FFF",border:"1px solid #DDD6FE"};

  return(
    <div style={{marginTop:8,border:`1px solid #EDE9FF`,borderRadius:6,overflow:"hidden"}}>

        <span style={{display:"flex",alignItems:"center",gap:6}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          {open?"Hide":"View"} {hidden.length} other field{hidden.length!==1?"s":""}
        </span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}><path d="M6 9l6 6 6-6"/></svg>
      </button>
      {open&&(
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={pHdr2}>Field</th>
            <th style={pHdr2}>Current Value</th>
            <th style={{...pHdr2,borderLeft:`1px solid #DDD6FE`}}>Proposed Value</th>
          </tr></thead>
          <tbody>{hidden.map((d,i)=>(
            <tr key={i} style={{background:i%2===0?"#fff":"#fafbff"}}>
              <td style={{...pCell2,fontWeight:600,width:110,whiteSpace:"nowrap"}}>{d.field}</td>
              <td style={{...pCell2,color:C.t2,fontFamily:"monospace",fontSize:12}}>{d.old||"—"}</td>
              <td style={{...pCell2,color:C.t2,fontFamily:"monospace",fontSize:12,borderLeft:`1px solid #EDE9FF`}}>{d.nw||d.old||"—"}</td>
            </tr>
          ))}</tbody>
        </table>
      )}
    </div>
  );
}

function DiffSection(diff,pHdr,pCell,C){
  var changedFields=diff.filter(function(d){return d.changed;});
  var otherFields=diff.filter(function(d){return !d.changed;});
  var orderedDiff=changedFields.concat(otherFields);
  var mainCount=Math.min(3,orderedDiff.length);
  var buildDiff=function(d){
    var oldStr=d.old||"";var newStr=d.nw||"";
    if(!d.changed)return{oldEl:<span style={{color:C.t2,fontSize:12.5}}>{oldStr}</span>,newEl:<span style={{color:C.t2,fontSize:12.5}}>{newStr}</span>};
    var isLong=oldStr.length>120;
    if(isLong){
      var oL=oldStr.split("\n"),nL=newStr.split("\n");
      var nS=new Set(nL),oS=new Set(oL);
      var del=oL.filter(function(l){return l.trim()&&!nS.has(l);}).slice(0,4);
      var add=nL.filter(function(l){return l.trim()&&!oS.has(l);}).slice(0,4);
      return{
        oldEl:<div style={{fontSize:11.5,fontFamily:"monospace",lineHeight:1.7}}><div style={{color:C.t3,fontSize:10.5,marginBottom:4,textTransform:"uppercase"}}>Removed lines</div>{del.length===0?<span style={{color:C.t3}}>No removed lines</span>:del.map(function(l,j){return <div key={j} style={{background:"#ffd7d5",color:"#b91c1c",padding:"3px 8px",borderRadius:4,marginBottom:3,wordBreak:"break-all"}}>{"- "}{l.trim().length>90?l.trim().substring(0,90)+"...":l.trim()}</div>;})}</div>,
        newEl:<div style={{fontSize:11.5,fontFamily:"monospace",lineHeight:1.7}}><div style={{color:C.t3,fontSize:10.5,marginBottom:4,textTransform:"uppercase"}}>Added lines</div>{add.length===0?<span style={{color:C.t3}}>No added lines</span>:add.map(function(l,j){return <div key={j} style={{background:"#ccffd8",color:"#15803d",padding:"3px 8px",borderRadius:4,marginBottom:3,wordBreak:"break-all"}}>{"+ "}{l.trim().length>90?l.trim().substring(0,90)+"...":l.trim()}</div>;})}</div>
      };
    }
    var pLen=0;
    while(pLen<oldStr.length&&pLen<newStr.length&&oldStr[pLen]===newStr[pLen])pLen++;
    var oSuf=oldStr.length,nSuf=newStr.length;
    while(oSuf>pLen&&nSuf>pLen&&oldStr[oSuf-1]===newStr[nSuf-1]){oSuf--;nSuf--;}
    var CTX=40,ps=Math.max(0,pLen-CTX);
    var cStyle={fontFamily:"monospace",fontSize:12,lineHeight:1.8,display:"block",wordBreak:"break-word",whiteSpace:"pre-wrap"};
    var oc=oldStr.slice(ps,pLen),ac=oldStr.slice(oSuf,Math.min(oldStr.length,oSuf+CTX));
    var nc=newStr.slice(pLen,nSuf),anc=newStr.slice(nSuf,Math.min(newStr.length,nSuf+CTX));
    return{
      oldEl:<span style={cStyle}>{ps>0&&<span style={{color:C.t3}}>...</span>}<span style={{color:C.t2}}>{oc}</span>{oldStr.slice(pLen,oSuf)&&<span style={{background:"#ffd7d5",color:"#b91c1c",fontWeight:600,borderRadius:3,padding:"0 2px",textDecoration:"line-through"}}>{oldStr.slice(pLen,oSuf)}</span>}<span style={{color:C.t2}}>{ac}</span>{oSuf+CTX<oldStr.length&&<span style={{color:C.t3}}>...</span>}</span>,
      newEl:<span style={cStyle}>{ps>0&&<span style={{color:C.t3}}>...</span>}<span style={{color:C.t2}}>{oc}</span>{nc&&<span style={{background:"#ccffd8",color:"#15803d",fontWeight:600,borderRadius:3,padding:"0 2px"}}>{nc}</span>}<span style={{color:C.t2}}>{anc}</span>{nSuf+CTX<newStr.length&&<span style={{color:C.t3}}>...</span>}</span>
    };
  };
  return(
    <div style={{marginBottom:20}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text,textAlign:"center",marginBottom:10}}>Data Difference Review</div>
      <table style={{width:"100%",borderCollapse:"collapse",border:"1px solid #DDD6FE"}}>
        <thead><tr>
          <th style={pHdr}>Field</th>
          <th style={pHdr}>Current Value</th>
          <th style={{...pHdr,borderLeft:"1px solid #DDD6FE"}}>Proposed Value</th>
        </tr></thead>
        <tbody>{orderedDiff.slice(0,mainCount).map(function(d,i){
          var res=buildDiff(d);
          var isLong=(d.old||"").length>120;
          return(
            <tr key={i} style={{background:i%2===0?C.bg:"#fafbff",borderBottom:"1px solid #EDE9FF"}}>
              <td style={{...pCell,fontWeight:600,verticalAlign:"top",whiteSpace:"nowrap",width:110}}>{d.field}</td>
              <td style={{...pCell,verticalAlign:"top",background:d.changed?"#fff8f8":C.bg,padding:"12px 16px"}}>
                <div style={{maxHeight:isLong?180:80,overflowY:isLong?"auto":"visible"}}>{res.oldEl}</div>
              </td>
              <td style={{...pCell,verticalAlign:"top",background:d.changed?"#f8fff9":C.bg,padding:"12px 16px",borderLeft:"1px solid #EDE9FF"}}>
                <div style={{maxHeight:isLong?180:80,overflowY:isLong?"auto":"visible"}}>{res.newEl}</div>
              </td>
            </tr>
          );
        })}</tbody>
      </table>
      <ExpandableFields diff={orderedDiff} mainCount={mainCount}/>
    </div>
  );
}

                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.t2,padding:0,lineHeight:1,display:"flex",alignItems:"center"}}>←</button>
                  <span style={{fontSize:16,fontWeight:700,color:C.text}}>Request Details</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:3}}>
                  <span style={{fontSize:12,color:C.blue,fontWeight:500}}>ID {req.id}</span>
                  <span style={{fontSize:11,color:C.t3}}>·</span>
                  <span style={{fontSize:12,color:C.t2}}>Target: <span style={{fontFamily:"monospace",color:C.blue,fontWeight:600}}>{req.targetId||"—"}</span></span>
                </div>
                <GBadge v={req.status}/>
              </div>
              {/* Right of header: requested by + date + category + action */}
              <div style={{marginLeft:32}}>
                <div style={{fontSize:12.5,color:C.t2,marginBottom:2}}>Requested by <span style={{color:C.blue,fontWeight:600}}>{req.maker}</span></div>
                <div style={{fontSize:11.5,color:C.t3,marginBottom:8}}>{req.date}</div>
                <div style={{display:"flex",gap:24}}>
                  <div><span style={{fontSize:12.5,fontWeight:600,color:C.text}}>Category</span><div style={{fontSize:13,color:C.t2,marginTop:2}}>{req.category}</div></div>
                  <div><span style={{fontSize:12.5,fontWeight:600,color:C.text}}>Action</span><div style={{fontSize:13,color:C.t2,marginTop:2}}>{req.action}</div></div>
                  {req.checkerName&&<div><span style={{fontSize:12.5,fontWeight:600,color:C.text}}>Approved by</span><div style={{fontSize:13,color:C.blue,marginTop:2}}>{req.checkerName}</div></div>}
                  <div style={{marginLeft:8}}>
                    <span style={{fontSize:12.5,fontWeight:600,color:C.text}}>Approvals</span>
                    <div style={{marginTop:4,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:req.status==="Approved"?C.greenT:req.status==="Declined"?C.redT:C.amberT}}>
                        {req.status==="Approved"?"1":"0"}/1
                      </span>
                      <span style={{fontSize:11.5,color:C.t3}}>
                        {req.status==="Approved"?"Approved":req.status==="Declined"?"Declined":"Pending Approval"}
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.t3,lineHeight:1,flexShrink:0}}>×</button>
          </div>
        </div>

        {/* ── TABS for closed requests ── */}
        {isClosed&&(
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,padding:"0 24px",flexShrink:0}}>
            {["maker","checker"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"10px 16px",fontSize:13,border:"none",background:"none",cursor:"pointer",color:tab===t?C.blue:C.t2,fontWeight:tab===t?600:400,borderBottom:tab===t?`2px solid ${C.blue}`:"2px solid transparent",marginBottom:-1}}>{t==="maker"?"Maker Submission":"Checker Remarks"}</button>)}
          </div>
        )}

        <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
          {(!isClosed||tab==="maker")&&<>
            {/* ── SECTION A: Reason + Attachments ── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginBottom:20}}>
              <div>
                <div style={{fontSize:12.5,fontWeight:600,color:C.text,marginBottom:8}}>Reason</div>
                <div style={{fontSize:13,color:C.t2,lineHeight:1.7}}>{req.reason||"No reason provided."}</div>
              </div>
              <div>
                <div style={{fontSize:12.5,fontWeight:600,color:C.text,marginBottom:8}}>Attachments</div>
                {req.atts&&req.atts.length>0?(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {req.atts.map((a,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",border:`1px solid ${C.border}`,borderRadius:6,background:C.bg2,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background=C.bg2}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.t2} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span style={{fontSize:12.5,color:C.text}}>{a.name}</span>
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{fontSize:12.5,color:C.t3}}>No attachments</div>
                )}
              </div>
            </div>

            {/* Context text */}
            {req.context&&<div style={{marginBottom:20}}>
              <div style={{fontSize:12.5,fontWeight:600,color:C.text,marginBottom:6}}>Context</div>
              <div style={{fontSize:13,color:C.t2,lineHeight:1.7}}>{req.context}</div>
            </div>}

            {/* ── SECTION B: Data Difference Review ── */}
            {DiffSection(req.diff,pHdr,pCell,C)}
            {/* ── SECTION B: Additional Context (two side-by-side mini tables) ── */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,textAlign:"center",marginBottom:10}}>Additional Context</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <table style={{borderCollapse:"collapse",border:`1px solid #DDD6FE`}}>
                  <thead><tr><th style={ctxHdr}>Field</th><th style={ctxHdr}>Current Value</th></tr></thead>
                  <tbody>{req.ctxData.slice(0,Math.ceil(req.ctxData.length/2)).map((c,i)=>(
                    <tr key={i}><td style={{...ctxCell,fontWeight:600,fontSize:12.5}}>{c.l}</td><td style={{...ctxCell,color:C.t2}}>{c.v}</td></tr>
                  ))}</tbody>
                </table>
                <table style={{borderCollapse:"collapse",border:`1px solid #DDD6FE`}}>
                  <thead><tr><th style={ctxHdr}>Field</th><th style={ctxHdr}>Current Value</th></tr></thead>
                  <tbody>{req.ctxData.slice(Math.ceil(req.ctxData.length/2)).map((c,i)=>(
                    <tr key={i}><td style={{...ctxCell,fontWeight:600,fontSize:12.5}}>{c.l}</td><td style={{...ctxCell,color:C.t2}}>{c.v}</td></tr>
                  ))}</tbody>
                </table>
              </div>
            </div>

            {/* ── SECTION C: Action Zone ── */}
            {!isClosed&&isChecker&&(
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
                <div style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6}}>Checker Remarks <span style={{fontSize:12,color:C.t3,fontWeight:400}}>(Optional for approval · Required for decline)</span></div>
                <textarea value={remark} onChange={e=>{setRemark(e.target.value);setRemarkErr(false);}} placeholder="Add your remarks here..." style={{width:"100%",padding:"8px 10px",border:`1px solid ${remarkErr?C.red:C.grayB}`,borderRadius:6,fontSize:13,color:C.text,background:C.bg,outline:"none",resize:"vertical",minHeight:72,fontFamily:"inherit"}} onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=remarkErr?C.red:C.grayB;e.currentTarget.style.boxShadow="none";}}/>
                {remarkErr&&<div style={{fontSize:12,color:C.red,marginTop:4}}>Remarks are required when declining a request.</div>}
                <div style={{fontSize:12,color:C.t3,marginTop:4}}>This will be recorded in the audit log and visible to the maker.</div>
              </div>
            )}
          </>}

          {/* ── CHECKER REMARKS TAB ── */}
          {isClosed&&tab==="checker"&&<>
            {req.status==="Error"&&(
              <div style={{marginBottom:16,padding:"14px 16px",background:"#fdf2f8",border:"1px solid #f9a8d4",borderRadius:8,display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:"#fce7f3",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9d174d" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#9d174d",marginBottom:4}}>Callback Failed — Source Service Unreachable</div>
                  <div style={{fontSize:12.5,color:"#be185d",lineHeight:1.6}}>The Checker approved this request but the callback to the source service returned a non-200 response. <strong>The target record was NOT changed.</strong> Engineering has been alerted. Manual intervention is required to resolve this request.</div>
                  <div style={{marginTop:10,padding:"8px 12px",background:"#fff",border:"1px solid #f9a8d4",borderRadius:6,fontSize:12,color:"#9d174d",fontFamily:"monospace"}}>HTTP 503 — Service Temporarily Unavailable · payments-svc/gmc-callback/freeze-account</div>
                </div>
              </div>
            )}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12.5,fontWeight:600,color:C.text,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>Request Decision</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
                <div><div style={{fontSize:11,color:C.t3,marginBottom:3,textTransform:"uppercase",letterSpacing:".05em"}}>{req.status==="Withdrawn"?"Withdrawn By":req.status==="Expired"?"Expired At":"Reviewed By"}</div><div style={{fontSize:13,fontWeight:500,color:C.text}}>{req.status==="Withdrawn"?req.maker:req.status==="Expired"?"System":req.checkerName||"—"}</div></div>
                <div><div style={{fontSize:11,color:C.t3,marginBottom:3,textTransform:"uppercase",letterSpacing:".05em"}}>{req.status==="Withdrawn"?"Withdrawn At":req.status==="Expired"?"Expired At":"Decision Date"}</div><div style={{fontSize:13,fontWeight:500,color:C.text}}>{req.checkerDate||"—"}</div></div>
                <div><div style={{fontSize:11,color:C.t3,marginBottom:3,textTransform:"uppercase",letterSpacing:".05em"}}>Final Status</div><GBadge v={req.status}/></div>
              </div>
            </div>
            <div style={{fontSize:12.5,fontWeight:600,color:C.text,marginBottom:6}}>Remarks</div>
            <div style={{fontSize:13,color:C.text,background:C.bg2,padding:"12px 14px",borderRadius:6,border:`1px solid ${C.border}`,lineHeight:1.7}}>
              {req.status==="Withdrawn"?"Request was withdrawn by the maker before checker action."
               :req.status==="Expired"?"Request expired due to SLA timeout with no checker action. Target ID lock has been released."
               :req.status==="Error"?"Checker approved. Callback to source service failed. No changes were applied."
               :req.checkerRemark||"No remarks provided."}
            </div>
          </>}
        </div>

        {/* ── FOOTER: Action buttons ── */}
        <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,justifyContent:"flex-end",alignItems:"center",flexShrink:0}}>
          {!isClosed&&isChecker&&<>
            <button onClick={()=>{if(!remark.trim()){setRemarkErr(true);return;}onDecline(req.id,remark);}} style={{padding:"7px 20px",background:"#dc2626",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:500,cursor:"pointer",transition:"opacity .12s"}} onMouseEnter={e=>e.currentTarget.style.opacity=".85"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>Decline</button>
            <button onClick={()=>onApprove(req.id,remark)} style={{padding:"7px 20px",background:"#059669",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:500,cursor:"pointer",transition:"opacity .12s"}} onMouseEnter={e=>e.currentTarget.style.opacity=".85"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>Approve</button>
          </>}
          {isClosed&&<Btn variant="outline" onClick={onClose}>Close</Btn>}
          {!isClosed&&isMakerOwnReq&&!isChecker&&(
            <button onClick={()=>setShowWithdrawConfirm(true)} style={{padding:"7px 20px",background:"#dc2626",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:500,cursor:"pointer",transition:"opacity .12s"}} onMouseEnter={e=>e.currentTarget.style.opacity=".85"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
              Withdraw
            </button>
          )}
          {!isClosed&&!isChecker&&!isMakerOwnReq&&<Btn variant="outline" onClick={onClose}>Close</Btn>}
        </div>
        {/* ── WITHDRAW CONFIRMATION MODAL ── */}
        {showWithdrawConfirm&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
            <div style={{background:C.bg,borderRadius:10,width:400,padding:"28px 24px",boxShadow:"0 8px 32px rgba(0,0,0,.22)",textAlign:"center"}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:"#fef2f2",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}}>Withdraw this request?</div>
              <div style={{fontSize:13.5,color:C.t2,lineHeight:1.6,marginBottom:20}}>
                This will cancel <strong>Request {req.id}</strong> and remove it from the checker's queue. This action cannot be undone.
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                <button onClick={()=>setShowWithdrawConfirm(false)} style={{padding:"8px 24px",background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:7,fontSize:13,fontWeight:500,cursor:"pointer"}}>Cancel</button>
                <button onClick={()=>{onWithdraw(req.id);setShowWithdrawConfirm(false);}} style={{padding:"8px 24px",background:"#dc2626",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:500,cursor:"pointer"}}>Yes, Withdraw</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function GMCLogsView({logs,setLogs,templates,setTemplates,initialOpenId=null,onInitialOpenConsumed=null}){
  const [sel,setSel]=useState(null);
  /* Open a specific log entry when navigated from another page */
  useEffect(()=>{
    if(initialOpenId){
      const found=logs.find(function(r){return r.id===initialOpenId;});
      if(found){setSel(found);}
      if(onInitialOpenConsumed){onInitialOpenConsumed();}
    }
  },[initialOpenId]);
  const [viewerPerm,setViewerPerm]=useState("gmc:view");
  const [toast,setToast]=useState(null);
  const [showLogFilters,setShowLogFilters]=useState(false);
  const [logStatusF,setLogStatusF]=useState("");
  const [logDomainF,setLogDomainF]=useState("");
  const [logSearch,setLogSearch]=useState("");
  const filteredLogs=logs.filter(r=>{
    if(logStatusF&&r.status!==logStatusF)return false;
    if(logDomainF&&r.domain!==logDomainF)return false;
    if(logSearch){
      const q=logSearch.toLowerCase();
      if(!r.activityId.toLowerCase().includes(q)&&!r.maker.toLowerCase().includes(q)&&!r.id.toLowerCase().includes(q))return false;
    }
    return true;
  });
  const handleApprove=(id,remark)=>{
    setLogs(p=>p.map(r=>r.id===id?{...r,status:"Approved",checkerName:"Roushan Gupta",checkerDate:new Date().toLocaleString(),checkerRemark:remark||"Approved."}:r));
    const log=logs.find(r=>r.id===id);
    if(log&&log.targetTemplateId){
      const newVals={};
      log.diff.forEach(d=>{if(d.field==="Body")newVals.body=d.nw;if(d.field==="Subject")newVals.subject=d.nw;if(d.field==="Status")newVals.status=d.nw;});
      setTemplates(p=>p.map(t=>t.id===log.targetTemplateId?{...t,...newVals}:t));
    }
    setSel(null);setToast("Request approved. Template updated successfully.");
  };
  const handleDecline=(id,remark)=>{
    setLogs(p=>p.map(r=>r.id===id?{...r,status:"Declined",checkerName:"Roushan Gupta",checkerDate:new Date().toLocaleString(),checkerRemark:remark||"Declined."}:r));
    setSel(null);setToast("Request declined.");
  };
  const handleWithdraw=(id)=>{
    setLogs(p=>p.map(r=>r.id===id?{...r,status:"Withdrawn",checkerDate:new Date().toLocaleString()}:r));
    setSel(null);setToast(`Request ${id} withdrawn successfully.`);
  };
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",padding:"20px 24px 12px",flexShrink:0}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:C.text,lineHeight:1.2,marginBottom:4}}>GMC Logs</div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12.5,color:C.t3}}>
            <span style={{color:C.t3}}>GMC</span>
            <span style={{fontSize:11}}>›</span>
            <span style={{color:C.t2,fontWeight:500}}>Logs</span>
          </div>
        </div>
        {/* Viewer switcher */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}>
          <span style={{fontSize:12,color:C.t2}}>Viewing as:</span>
          <div style={{display:"inline-flex",background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:3,gap:2}}>
            {[["gmc:view","Utkarsh (View only)"],["gmc:manage","Roushan (Checker)"]].map(([perm,label])=>(
              <button key={perm} onClick={()=>setViewerPerm(perm)} style={{padding:"4px 12px",fontSize:12,border:"none",cursor:"pointer",borderRadius:6,background:viewerPerm===perm?C.bg:"transparent",color:viewerPerm===perm?C.blue:C.t2,fontWeight:viewerPerm===perm?600:400,boxShadow:viewerPerm===perm?"0 1px 3px rgba(0,0,0,.1)":"none",transition:"all .12s"}}>{label}</button>
            ))}
          </div>
        </div>
      </div>
      {/* ── Search + Show Filters row ── */}
      <div style={{padding:"0 24px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",border:`1px solid ${C.grayB}`,borderRadius:6,overflow:"hidden",background:C.bg,height:34}}>
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 10px"}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input value={logSearch} onChange={e=>setLogSearch(e.target.value)} placeholder="Search Activity ID or Maker..." style={{border:"none",outline:"none",fontSize:13,width:240,color:C.text,background:"transparent"}}/>
          </div>
        </div>
        <button onClick={()=>setShowLogFilters(f=>!f)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",border:`1px solid ${C.grayB}`,borderRadius:6,background:showLogFilters?"#f8faff":C.bg,color:showLogFilters?C.blue:C.t2,fontSize:12.5,cursor:"pointer",fontWeight:showLogFilters?500:400}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 6h22M5 12h14M9 18h6"/></svg>
          {showLogFilters?"Hide Filters":"Show Filters"}
        </button>
      </div>
      {showLogFilters&&(
        <div style={{display:"flex",gap:16,padding:"0 24px 14px",alignItems:"flex-end",flexShrink:0,flexWrap:"wrap"}}>
          <div style={{minWidth:160}}>
            <div style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6}}>Status</div>
            <div style={{position:"relative"}}>
              <select value={logStatusF} onChange={e=>setLogStatusF(e.target.value)} style={{width:"100%",padding:"8px 32px 8px 12px",border:`1px solid ${C.grayB}`,borderRadius:7,fontSize:13,color:C.text,background:C.bg,outline:"none",cursor:"pointer",appearance:"none",WebkitAppearance:"none"}}>
                <option value="">All</option><option value="Pending">Pending</option><option value="Approved">Approved</option><option value="Declined">Declined</option><option value="Withdrawn">Withdrawn</option><option value="Expired">Expired</option><option value="Error">Error</option>
              </select>
              <svg style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          </div>
          <div style={{minWidth:160}}>
            <div style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6}}>Domain</div>
            <div style={{position:"relative"}}>
              <select value={logDomainF} onChange={e=>setLogDomainF(e.target.value)} style={{width:"100%",padding:"8px 32px 8px 12px",border:`1px solid ${C.grayB}`,borderRadius:7,fontSize:13,color:C.text,background:C.bg,outline:"none",cursor:"pointer",appearance:"none",WebkitAppearance:"none"}}>
                <option value="">All</option><option value="Communication">Communication</option><option value="Payments">Payments</option><option value="Customers &amp; KYC">Customers &amp; KYC</option><option value="Admin">Admin</option>
              </select>
              <svg style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          </div>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",padding:"0 24px"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={thS}>Request ID</th><th style={thS}>Activity ID</th><th style={thS}>Target ID</th>
            <th style={thS}>Flow Name</th><th style={thS}>Domain</th><th style={thS}>Maker</th>
            <th style={thS}>Date</th><th style={thS}>Status</th><th style={thSL}>Actions</th>
          </tr></thead>
          <tbody>
            {filteredLogs.map(r=>(
              <tr key={r.id} style={{background:C.bg,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=C.bg2} onMouseLeave={e=>e.currentTarget.style.background=C.bg} onClick={()=>setSel(r)}>
                <td style={{...tdS,fontFamily:"monospace",fontSize:12,color:C.t2}}>{r.id}</td>
                <td style={{...tdS,fontFamily:"monospace",fontSize:12,color:C.t2}}>{r.activityId}</td>
                <td style={{...tdS,fontFamily:"monospace",fontSize:12,color:C.blue}}>{r.targetId||"—"}</td>
                <td style={tdS}>{r.flowName}</td>
                <td style={tdS}>{r.domain}</td>
                <td style={tdS}>{r.maker}</td>

        <button onClick={()=>setToast(null)} style={{marginLeft:8,background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
      </div>}
    </div>
  );
}

            <div style={{border:`1px solid ${C.border}`,borderRadius:6,padding:"16px",textAlign:"center",marginBottom:14,background:C.bg2}}>
              <div style={{fontSize:13,color:C.t3}}>Select a domain to see available context queries</div>

          ):(

                  <th style={miniTh}>Query Name</th>
                  <th style={miniTh}>What It Shows the Checker</th>
                </tr></thead>
                <tbody>
                  {(CONTEXT_PROVIDERS[section]||[]).length===0
                    ?<tr><td colSpan={3} style={{...miniTd,color:C.t3,textAlign:"center"}}>No context queries registered for this domain yet</td></tr>

                      var isSel=ctxRows.some(function(r){return r.id===p.id;});
                      return(
                        <tr key={i} onClick={function(){if(isEditMode&&isRestricted)return;setCtxRows(function(prev){return isSel?prev.filter(function(r){return r.id!==p.id;}):[...prev,{id:p.id,label:p.label,query:p.id}];});}}

                            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${isSel?C.blue:C.grayB}`,background:isSel?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",transition:"all .12s"}}>
                              {isSel&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                            </div>
                          </td>
                          <td style={{...miniTd,fontWeight:isSel?600:400,color:isSel?C.text:C.t2}}>{p.label}</td>

          {/* ── ASSIGN MAKERS & CHECKERS (Role-based) ── */}
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`,textTransform:"uppercase",letterSpacing:".06em"}}>Assign Makers & Checkers</div>

            {makerPerms.length>0&&(

                  <option value="">Select permission...</option>
                  {ALL_ROLES.filter(function(r){return checkerPerms.indexOf(r.key)===-1;}).map(function(r){return <option key={r.key} value={r.key}>{r.key}</option>;})}
                </select>
                <svg style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
              </div>
              <button onClick={function(){if(checkerIn){setCheckerPerms(function(p){return[...p,checkerIn];});setCheckerIn("");}}} style={{padding:"8px 14px",background:checkerIn?"#111827":C.grayB,color:checkerIn?"#fff":C.t3,border:"none",borderRadius:7,fontSize:13,fontWeight:500,cursor:checkerIn?"pointer":"not-allowed",flexShrink:0}}>+ Add</button>
            </div>
            {saveAttempted&&checkerPerms.length===0&&<div style={{marginTop:6,fontSize:12,color:C.red}}>At least one Checker Permission is required.</div>}
          </div>
        </div>
        {/* Config Lock message — edit mode only */}
        {isEditMode&&isRestricted&&saveBlocked&&(
          <div style={{margin:"0 20px 0",padding:"10px 14px",background:C.redL,border:`1px solid ${C.redB}`,borderRadius:7,fontSize:12.5,color:C.redT,display:"flex",alignItems:"center",gap:8}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Changes cannot be saved while an active request exists for this activity.
          </div>
        )}
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:C.t3}}>
            {isEditMode&&isRestricted?(
              <span style={{display:"flex",alignItems:"center",gap:5,color:C.t3}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Active requests exist — Save is blocked
              </span>
            ):section&&modalId?(
              <span style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{color:C.greenT}}>✓ {diffRows.length} diff · {ctxRows.filter(r=>r.label).length} ctx queries</span>
                <span style={{color:makerPerms.length>0&&checkerPerms.length>0?C.greenT:saveAttempted&&(makerPerms.length===0||checkerPerms.length===0)?C.red:C.t3}}>
                  {makerPerms.length>0&&checkerPerms.length>0?"✓ maker + checker permissions set":makerPerms.length===0?"add maker permission":"add checker permission"}
                </span>
              </span>
            ):"Fill in domain and modal ID to configure diff fields"}
          </span>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="outline" onClick={onClose}>Cancel</Btn>
            <button onClick={handleSaveActivity} style={{padding:"7px 18px",background:isEditMode&&isRestricted?C.grayB:section&&makerPerms.length>0&&checkerPerms.length>0?"#111827":C.grayB,color:section&&makerPerms.length>0&&checkerPerms.length>0?"#fff":C.t3,border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:section&&makerPerms.length>0&&checkerPerms.length>0?"pointer":"not-allowed",transition:"background .15s"}}>
              {isEditMode?"Save Changes":"Save Activity"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function GMCConfigsView({logs=[]}){
  const [showCreate,setShowCreate]=useState(false);
  const [showFilters,setShowFilters]=useState(false);
  const [statusFilter,setStatusFilter]=useState("");
  const [sectionFilter,setSectionFilter]=useState("");
  const [searchQ,setSearchQ]=useState("");
  const [selAct,setSelAct]=useState(null);
  const [actModal,setActModal]=useState(null); /* "view"|"edit"|"deactivate" */
  const [toast,setToast]=useState(null);
  const [configs,setConfigs]=useState(ACTIVITY_CONFIGS);
  /* Activities — no config lock. Edit and Deactivate always available. Changes apply prospectively. */
  const activitiesWithLogs=new Set();

  const filtered=configs.filter(a=>{
    if(statusFilter&&a.status!==statusFilter)return false;
    if(sectionFilter&&a.section!==sectionFilter)return false;
    if(searchQ&&!a.id.toLowerCase().includes(searchQ.toLowerCase())&&!a.name.toLowerCase().includes(searchQ.toLowerCase()))return false;
    return true;
  });

  const handleDeactivate=(id)=>{
    setConfigs(p=>p.map(a=>a.id===id?{...a,status:a.status==="Active"?"Inactive":"Active"}:a));
    setActModal(null);setSelAct(null);
    setToast("Activity status updated.");
  };

  const thS={textAlign:"left",fontSize:11,fontWeight:600,color:C.t2,padding:"10px 16px",background:C.bg,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap",letterSpacing:".06em",textTransform:"uppercase"};
  const thSL={...thS,textAlign:"right"};

function PageHeader({title,breadcrumb,actions}){

            const isClickable=!isLast&&typeof onClick==="function";

              <span key={i} style={{display:"flex",alignItems:"center",gap:5}}>

              </span>

function EditConstraintModal({constraint,onClose,onLogAdd,onToast}){
  const [status,setStatus]=useState(constraint.status==="Active");
  const [groups,setGroups]=useState({consumer:true,merchant:true,seller:true});
  const [minAmt,setMinAmt]=useState(constraint.minAmount.replace("₱","").replace(",",""));
  const [maxAmt,setMaxAmt]=useState(constraint.maxAmount.replace("₱","").replace(",",""));
  const [send,setSend]=useState(constraint.send);
  const [receive,setReceive]=useState(constraint.receive);
  const [showGMC,setShowGMC]=useState(false);
  const dirty=true;
  /* Diff: changed fields first, then unchanged — always all 5 fields */
  const diff=(()=>{
    const changed=[];const unchanged=[];
    const max0=constraint.maxAmount.replace("₱","").replace(",","");
    if(maxAmt!==max0)changed.push({field:"Max Amount",old:constraint.maxAmount,nw:`₱${maxAmt}`,changed:true});
    else unchanged.push({field:"Max Amount",old:constraint.maxAmount,nw:constraint.maxAmount,changed:false});
    const min0=constraint.minAmount.replace("₱","").replace(",","");
    if(minAmt!==min0)changed.push({field:"Min Amount",old:constraint.minAmount,nw:`₱${minAmt}`,changed:true});
    else unchanged.push({field:"Min Amount",old:constraint.minAmount,nw:constraint.minAmount,changed:false});
    const origStatus=constraint.status==="Active";
    if(status!==origStatus)changed.push({field:"Status",old:constraint.status,nw:status?"Active":"Inactive",changed:true});
    else unchanged.push({field:"Status",old:constraint.status,nw:constraint.status,changed:false});
    const origGroups="CONSUMER, MERCHANT";
    const newGrpStr=Object.entries(groups).filter(([,v])=>v).map(([k])=>k.toUpperCase()).join(", ")||"None";
    if(newGrpStr!==origGroups)changed.push({field:"Destination Accounts Group",old:origGroups,nw:newGrpStr,changed:true});
    else unchanged.push({field:"Destination Accounts Group",old:origGroups,nw:origGroups,changed:false});
    const origMM=`Send: ${constraint.send?"Yes":"No"}, Receive: ${constraint.receive?"Yes":"No"}`;
    const newMM=`Send: ${send?"Yes":"No"}, Receive: ${receive?"Yes":"No"}`;
    if(newMM!==origMM)changed.push({field:"Money Movement",old:origMM,nw:newMM,changed:true});
    else unchanged.push({field:"Money Movement",old:origMM,nw:origMM,changed:false});
    return [...changed,...unchanged];
  })();
  const inputStyle={width:"100%",padding:"10px 12px",border:`1px solid ${C.grayB}`,borderRadius:7,fontSize:13,color:C.text,background:C.bg,outline:"none"};
  const handleGMCConfirm=(reason,ctx)=>{
    const newId=`REQ_${1240+Math.floor(Math.random()*90)}`;
    onLogAdd({id:newId,activityId:"ACT_PAY_005",approvalCount:1,approvalsReceived:0,flowName:"Edit Account Type Constraint",domain:"Payments",maker:"Utkarsh Giri",submittedBy:{userId:"usr_001",name:"Utkarsh Giri"},date:fmtDate(),status:"Pending",targetId:`CONS_${constraint.id}`,category:"Payments — Configs",action:"Edit Account Type Constraint",reason,context:ctx,atts:[],diff,ctxData:[{l:"Account Type Name",v:(constraint.at&&constraint.at.name)||"UTKARSH_BAWA_0"},{l:"Account Type Group",v:"Consumer"},{l:"Wallet Balance Limit",v:"₱100,000"},{l:"Daily Outgoing Limit",v:"₱10,000"},{l:"Monthly Incoming Limit",v:"₱100,000"}],checkerRemark:"",checkerName:"",checkerDate:"",targetTemplateId:null});
    setShowGMC(false);onClose();onToast(`Request ${newId} submitted for approval.`);
  };
  const grpList=Object.entries(groups).filter(([,v])=>v).map(([k])=>k.charAt(0).toUpperCase()+k.slice(1)).join(", ")||"None";
  return(
    <>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000}}>
      <div style={{background:C.bg,borderRadius:8,width:480,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,.2)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:600,color:C.text}}>Edit Constraint ID: {constraint.id}</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.t3}}>×</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
          {/* Status toggle */}
          <div style={{marginBottom:18,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13,fontWeight:500,color:C.text}}>Status</span>
            <div onClick={()=>setStatus(s=>!s)} style={{width:38,height:22,borderRadius:11,background:status?C.blue:C.grayB,cursor:"pointer",position:"relative",transition:"background .15s"}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:status?18:2,transition:"left .15s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
            </div>
          </div>
          {/* Destination Groups */}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6,display:"block"}}>Destination Accounts Group</label>
            <div style={{border:`1px solid ${C.blue}`,borderRadius:7,overflow:"hidden"}}>
              <div style={{padding:"8px 12px",background:C.bg,fontSize:13,color:C.t2}}>{grpList} <span style={{float:"right",color:C.t3,fontSize:12}}>▼</span></div>
              {["consumer","merchant","seller"].map(g=>(
                <label key={g} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",cursor:"pointer",borderTop:`1px solid ${C.border}`,background:groups[g]?C.blueL:"transparent"}}>
                  <input type="checkbox" checked={groups[g]} onChange={e=>setGroups(prev=>({...prev,[g]:e.target.checked}))} style={{accentColor:C.blue}}/>
                  <span style={{fontSize:13,fontWeight:500,color:groups[g]?C.blue:C.text}}>{g.toUpperCase()}</span>
                </label>
              ))}
            </div>
          </div>
          {/* Min/Max Amount */}
          {[["Min Amount",minAmt,setMinAmt],["Max Amount",maxAmt,setMaxAmt]].map(([l,v,s])=>(
            <div key={l} style={{marginBottom:14}}>
              <label style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:6,display:"block"}}>{l}</label>
              <input type="number" value={v} onChange={e=>s(e.target.value)} style={inputStyle} onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            </div>
          ))}
          {/* Money Movement */}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12.5,fontWeight:500,color:C.text,marginBottom:8,display:"block"}}>Money Movement</label>
            <div style={{display:"flex",gap:16}}>
              {[["Send",send,setSend],["Receive",receive,setReceive]].map(([l,v,s])=>(
                <label key={l} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:13}}>
                  <input type="checkbox" checked={v} onChange={e=>s(e.target.checked)} style={{accentColor:C.blue}}/>{l}
                </label>
              ))}
            </div>
          </div>
        </div>
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn variant="outline" onClick={onClose}>Cancel</Btn>
          <button onClick={()=>setShowGMC(true)} style={{padding:"7px 20px",background:"#111827",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer"}}>Update</button>
        </div>
      </div>
    </div>
    {showGMC&&<GMCReasoningModal diff={diff} onConfirm={handleGMCConfirm} onCancel={()=>setShowGMC(false)}/>}
    </>
  );
}

          {/* Upload zones */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
            {uploadZone("ID Card",idCard,setIdCard)}
            {uploadZone("Photo with ID Card",photo,setPhoto)}
            {uploadZone("Selfie",selfie,setSelfie)}
          </div>
          {/* Fields */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12.5,color:C.text,marginBottom:5,display:"block"}}>Support Ticket ID</label>
            <input value={supportId} onChange={e=>setSupportId(e.target.value)} style={inputStyle} placeholder="e.g. KEDS-2891" onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
            <div style={{fontSize:11,color:C.t3,marginTop:3}}>Only alphanumeric characters, #, and - are allowed</div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12.5,color:C.text,marginBottom:5,display:"block"}}>Reason for MPIN Reset</label>
            <input value={reason} onChange={e=>setReason(e.target.value)} style={inputStyle} onFocus={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.boxShadow=`0 0 0 3px ${C.blueL}`;}} onBlur={e=>{e.currentTarget.style.borderColor=C.grayB;e.currentTarget.style.boxShadow="none";}}/>
          </div>
          {/* Verification */}
          <label style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",fontSize:12.5,color:C.text,lineHeight:1.5}}>
            <input type="checkbox" checked={verified} onChange={e=>setVerified(e.target.checked)} style={{accentColor:C.blue,marginTop:2}}/>
            I have verified that the documents submitted by the user matches their KYC records recorded during their registration with SMART Money app.
          </label>
        </div>
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn variant="outline" onClick={onClose}>Cancel</Btn>
          <button disabled={!canConfirm} onClick={()=>canConfirm&&setStep(2)} style={{padding:"7px 20px",background:canConfirm?"#111827":C.grayB,color:canConfirm?"#fff":C.t3,border:"none",borderRadius:6,fontSize:13,fontWeight:500,cursor:canConfirm?"pointer":"not-allowed"}}>Confirm</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState("gmc-logs");
  const [openLogId,setOpenLogId]=useState(null);
  const [templates,setTemplates]=useState(INIT_TEMPLATES);
  const [logs,setLogs]=useState(ALL_INIT_LOGS);

  const handleTemplateUpdate=(id,form)=>{
    setTemplates(p=>p.map(t=>t.id===id?{...t,...form,title:form.subject||t.title}:t));
  };
  const handleLogAdd=(log)=>{
    setLogs(p=>[log,...p]);
  };
  const pendingCount=logs.filter(r=>r.status==="Pending").length;

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
      <Sidebar page={page} onPage={setPage} pendingCount={pendingCount}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:C.bg,position:"relative"}}>
        {page==="manage-template"&&<ManageTemplateView templates={templates} onTemplateUpdate={handleTemplateUpdate} onLogAdd={handleLogAdd}/>}
        {page==="gmc-logs"&&<GMCLogsView logs={logs} setLogs={setLogs} templates={templates} setTemplates={setTemplates} initialOpenId={openLogId} onInitialOpenConsumed={()=>setOpenLogId(null)}/>}
        {page==="gmc-configs"&&<GMCConfigsView logs={logs}/>}
        {page==="pay-consumers"&&<ConsumersView onLogAdd={handleLogAdd} onPage={setPage} onOpenLog={(id)=>{setOpenLogId(id);setPage("gmc-logs");}}/>}
        {page==="pay-manual-transfer"&&<ManualTransferView onLogAdd={handleLogAdd}/>}
        {page==="pay-account-types"&&<AccountTypesView onLogAdd={handleLogAdd}/>}
        {page==="kyc-customers"&&<KycCustomersView onLogAdd={handleLogAdd}/>}
        {page!=="manage-template"&&page!=="gmc-logs"&&page!=="gmc-configs"&&page!=="pay-consumers"&&page!=="pay-manual-transfer"&&page!=="pay-account-types"&&page!=="kyc-customers"&&(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.t3,fontSize:13,flexDirection:"column",gap:8}}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Select a section from the sidebar</span>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
